<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Detail Akun</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168,85,247,0.07) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .container { width: 100%; max-width: 700px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
        .brand h2 {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 10px 18px; border-radius: var(--radius-pill);
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition);
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #7c3aed); border: none; color: #fff; }
        .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .btn-small { padding: 6px 12px; font-size: 0.7rem; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), var(--shadow-glow); margin-bottom: 20px;
        }
        .card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }

        .account-list { display: flex; flex-direction: column; gap: 12px; }
        .account-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-md); padding: 14px;
        }
        .account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .account-game { font-weight: 600; color: #fff; }
        .account-detail { font-size: 0.85rem; color: #d4d4e0; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .detail-label { color: var(--text-secondary); font-size: 0.7rem; }

        .empty-state { text-align: center; color: #6b6b80; padding: 30px 0; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-lg); width: 90%; max-width: 400px; padding: 20px;
        }
        .modal h4 { color: #fff; margin-bottom: 16px; }
        .modal .form-group { margin-bottom: 12px; }
        .modal label { display: block; color: #a0a0b8; font-size: 0.8rem; margin-bottom: 4px; }
        .form-input, .form-select {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px; color: #fff;
            font-family: inherit; font-size: 0.85rem; outline: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--accent); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); z-index: 200;
            transition: transform 0.35s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239,68,68,0.4); background: #1e1418; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand"><h2>👤 Detail Akun Game</h2></div>
            <div style="display:flex; gap:8px;">
                <button class="btn" id="pilihUserBtn" style="display:none;">👥 Pilih User</button>
                <button class="btn btn-primary" id="addAccountBtn">➕ Tambah Akun</button>
                <a href="dashboard.html" class="btn">⬅ Kembali</a>
            </div>
        </div>

        <div class="card">
            <h3>Daftar Akun Game</h3>
            <div class="account-list" id="accountList"></div>
        </div>
    </div>

    <!-- Modal Tambah/Edit Akun -->
    <div class="modal-overlay" id="accountModal">
        <div class="modal">
            <h4 id="accountModalTitle">Tambah Akun</h4>
            <input type="hidden" id="accountId">
            <div class="form-group">
                <label>Nama Game</label>
                <input type="text" class="form-input" id="namaGame" placeholder="Genshin Impact">
            </div>
            <div class="form-group">
                <label>List Joki</label>
                <input type="text" class="form-input" id="listJoki" placeholder="Explore x2, Rawat akun 1 bln">
            </div>
            <div class="form-group">
                <label>ID Game</label>
                <input type="text" class="form-input" id="idGame" placeholder="812345678">
            </div>
            <div class="form-group">
                <label>Password Game</label>
                <input type="text" class="form-input" id="passwordGame" placeholder="rahasia123">
            </div>
            <div class="form-group">
                <label>Nickname Game</label>
                <input type="text" class="form-input" id="nickname" placeholder="TravelerPro">
            </div>
            <div class="form-group">
                <label>Server Game</label>
                <input type="text" class="form-input" id="server" placeholder="Asia">
            </div>
            <div class="form-group">
                <label>Login Via</label>
                <select class="form-select" id="loginVia">
                    <option value="Google">Google</option>
                    <option value="Facebook">Facebook</option>
                    <option value="Twitter">Twitter</option>
                    <option value="Email">Email</option>
                    <option value="Game Center">Game Center</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status Pembayaran</label>
                <select class="form-select" id="statusPembayaran">
                    <option value="Lunas">Lunas</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn" id="closeAccountModal">Batal</button>
                <button class="btn btn-primary" id="saveAccount">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Pilih User (Admin) -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <h4>Pilih User</h4>
            <div id="userList" style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
            <div class="modal-actions">
                <button class="btn" id="closeUserModal">Batal</button>
                <button class="btn btn-primary" id="confirmUser">Pilih</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --- User ---
            let currentUser = null;
            try { currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser')); } catch(e) {}
            if (!currentUser) { window.location.href = 'index.html'; return; }
            const isAdmin = currentUser.role === 'admin';

            // --- Keys ---
            const ACCOUNT_KEY = 'shiroha_detail_akun';
            const USERS_KEY = 'shiroha_users';

            // --- Data ---
            let accounts = JSON.parse(localStorage.getItem(ACCOUNT_KEY)) || [];
            let selectedUserId = isAdmin ? null : currentUser.id; // Admin bisa pilih user

            function saveAccounts() { localStorage.setItem(ACCOUNT_KEY, JSON.stringify(accounts)); }

            // --- Toast ---
            const toast = document.getElementById('toast');
            function showToast(msg, isErr = false) {
                toast.textContent = msg;
                toast.className = 'toast' + (isErr ? ' error' : '');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // --- Tampilkan tombol admin ---
            if (isAdmin) {
                document.getElementById('pilihUserBtn').style.display = 'inline-flex';
            }

            // --- Render Daftar Akun ---
            function renderAccounts() {
                const container = document.getElementById('accountList');
                const filtered = selectedUserId ? accounts.filter(a => a.userId === selectedUserId) : accounts;
                if (filtered.length === 0) {
                    container.innerHTML = '<div class="empty-state">Belum ada data akun.</div>';
                    return;
                }
                container.innerHTML = filtered.map(acc => `
                    <div class="account-item">
                        <div class="account-header">
                            <span class="account-game">🎮 ${acc.namaGame}</span>
                            <div>
                                <button class="btn btn-small edit-account-btn" data-id="${acc.id}">✏️</button>
                                <button class="btn btn-small btn-danger delete-account-btn" data-id="${acc.id}">🗑</button>
                            </div>
                        </div>
                        <div class="account-detail">
                            <div><span class="detail-label">List Joki:</span> ${acc.listJoki}</div>
                            <div><span class="detail-label">ID Game:</span> ${acc.idGame}</div>
                            <div><span class="detail-label">Password:</span> ${isAdmin ? acc.passwordGame : '••••••'}</div>
                            <div><span class="detail-label">Nickname:</span> ${acc.nickname}</div>
                            <div><span class="detail-label">Server:</span> ${acc.server}</div>
                            <div><span class="detail-label">Login Via:</span> ${acc.loginVia}</div>
                            <div><span class="detail-label">Pembayaran:</span> ${acc.statusPembayaran}</div>
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.edit-account-btn').forEach(b =>
                    b.addEventListener('click', () => openAccountModal(parseInt(b.dataset.id))));
                document.querySelectorAll('.delete-account-btn').forEach(b =>
                    b.addEventListener('click', () => deleteAccount(parseInt(b.dataset.id))));
            }

            // --- Modal Akun ---
            const accountModal = document.getElementById('accountModal');
            const accountModalTitle = document.getElementById('accountModalTitle');
            const accountId = document.getElementById('accountId');
            const namaGame = document.getElementById('namaGame');
            const listJoki = document.getElementById('listJoki');
            const idGame = document.getElementById('idGame');
            const passwordGame = document.getElementById('passwordGame');
            const nickname = document.getElementById('nickname');
            const server = document.getElementById('server');
            const loginVia = document.getElementById('loginVia');
            const statusPembayaran = document.getElementById('statusPembayaran');

            function openAccountModal(id = null) {
                if (id) {
                    const acc = accounts.find(a => a.id === id);
                    if (!acc) return;
                    accountId.value = acc.id;
                    namaGame.value = acc.namaGame;
                    listJoki.value = acc.listJoki;
                    idGame.value = acc.idGame;
                    passwordGame.value = acc.passwordGame;
                    nickname.value = acc.nickname;
                    server.value = acc.server;
                    loginVia.value = acc.loginVia;
                    statusPembayaran.value = acc.statusPembayaran;
                    accountModalTitle.textContent = 'Edit Akun';
                } else {
                    accountId.value = '';
                    namaGame.value = '';
                    listJoki.value = '';
                    idGame.value = '';
                    passwordGame.value = '';
                    nickname.value = '';
                    server.value = '';
                    loginVia.value = 'Google';
                    statusPembayaran.value = 'Pending';
                    accountModalTitle.textContent = 'Tambah Akun';
                }
                accountModal.style.display = 'flex';
            }

            document.getElementById('closeAccountModal').addEventListener('click', () => accountModal.style.display = 'none');
            document.getElementById('saveAccount').addEventListener('click', () => {
                const id = accountId.value ? parseInt(accountId.value) : Date.now();
                const data = {
                    id,
                    userId: selectedUserId || currentUser.id,
                    namaGame: namaGame.value.trim(),
                    listJoki: listJoki.value.trim(),
                    idGame: idGame.value.trim(),
                    passwordGame: passwordGame.value.trim(),
                    nickname: nickname.value.trim(),
                    server: server.value.trim(),
                    loginVia: loginVia.value,
                    statusPembayaran: statusPembayaran.value
                };
                if (!data.namaGame || !data.listJoki) {
                    showToast('Nama Game dan List Joki wajib diisi.', true);
                    return;
                }
                const existing = accounts.find(a => a.id === id);
                if (existing) {
                    Object.assign(existing, data);
                } else {
                    accounts.push(data);
                }
                saveAccounts();
                accountModal.style.display = 'none';
                renderAccounts();
                showToast('Akun disimpan.');
            });

            function deleteAccount(id) {
                if (!confirm('Hapus akun ini?')) return;
                accounts = accounts.filter(a => a.id !== id);
                saveAccounts();
                renderAccounts();
                showToast('Akun dihapus.');
            }

            // --- Tambah Akun (cek user yang dipilih) ---
            document.getElementById('addAccountBtn').addEventListener('click', () => {
                if (isAdmin && !selectedUserId) {
                    showToast('Silakan pilih user terlebih dahulu.', true);
                    return;
                }
                openAccountModal();
            });

            // --- Modal Pilih User (Admin) ---
            const userModal = document.getElementById('userModal');
            const userList = document.getElementById('userList');

            document.getElementById('pilihUserBtn').addEventListener('click', () => {
                const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
                userList.innerHTML = users.map(u => `
                    <div class="account-item" style="cursor:pointer;" data-userid="${u.id}">
                        <input type="radio" name="userRadio" value="${u.id}" ${selectedUserId === u.id ? 'checked' : ''}>
                        <span style="color:#fff;">${u.username} (${u.id})</span>
                    </div>
                `).join('');
                userModal.style.display = 'flex';
                document.querySelectorAll('#userList .account-item').forEach(el => {
                    el.addEventListener('click', () => {
                        document.querySelectorAll('input[name="userRadio"]').forEach(r => r.checked = false);
                        el.querySelector('input').checked = true;
                    });
                });
            });

            document.getElementById('closeUserModal').addEventListener('click', () => userModal.style.display = 'none');
            document.getElementById('confirmUser').addEventListener('click', () => {
                const checked = document.querySelector('input[name="userRadio"]:checked');
                if (checked) {
                    selectedUserId = checked.value;
                    renderAccounts();
                }
                userModal.style.display = 'none';
            });

            // --- Init ---
            renderAccounts();
        })();
    </script>
</body>
</html>
