<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIROHA JOKI - Detail Akun</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168, 85, 247, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #ffffff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), var(--shadow-glow);
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: -0.2px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .detail-item {
            background: rgba(255,255,255,0.02);
            border-radius: var(--radius-md);
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .detail-item.full-width {
            grid-column: span 2;
        }
        .detail-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .detail-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffffff;
            word-break: break-word;
        }
        .detail-value input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }
        .detail-value input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .status-lunas {
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }
        .status-pending {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.3);
        }
        .btn-primary:hover { box-shadow: 0 10px 32px rgba(168, 85, 247, 0.45); transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.15);
            color: #d4d4e0;
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-outline:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.03); color: #fff; }

        .edit-toggle {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e;
            color: #f1f1f3;
            padding: 12px 22px;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 28px rgba(0,0,0,0.5);
            z-index: 200;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            backdrop-filter: blur(8px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239,68,68,0.4); background: #1e1418; color: #fca5a5; }

        @media (max-width: 500px) {
            .detail-grid { grid-template-columns: 1fr; }
            .detail-item.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand">
                <h1>👤 Detail Akun Game</h1>
            </div>
            <a href="dashboard.html" class="back-btn">⬅ Kembali</a>
        </div>

        <div class="card" id="akunCard">
            <h2>Informasi Akun</h2>
            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-label">Nama Game</div>
                    <div class="detail-value" id="displayNamaGame">Genshin Impact</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">List Joki</div>
                    <div class="detail-value" id="displayListJoki">Explore x2, Rawat akun 1 bln</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">ID Game</div>
                    <div class="detail-value" id="displayIdGame">812345678</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Password Game</div>
                    <div class="detail-value" id="displayPasswordGame">••••••••</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Nickname Game</div>
                    <div class="detail-value" id="displayNickname">TravelerPro</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Server Game</div>
                    <div class="detail-value" id="displayServer">Asia</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Login Via</div>
                    <div class="detail-value" id="displayLoginVia">Google</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Status Pembayaran</div>
                    <div class="detail-value" id="displayStatusPembayaran"><span class="status-badge status-lunas">Lunas ✓</span></div>
                </div>
            </div>

            <!-- Tombol edit hanya muncul jika admin -->
            <div class="edit-toggle" id="editToggle" style="display: none;">
                <button class="btn-outline" id="btnEdit">✏️ Edit</button>
                <button class="btn-primary" id="btnSimpan" style="display: none;">💾 Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Simulasi user login (dari session/localStorage)
            // Untuk demo, kita cek localStorage 'currentUser'
            let currentUser = null;
            try {
                currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser'));
            } catch(e) {}

            // Jika belum login, redirect ke login.html
            if (!currentUser) {
                // Untuk keperluan demo, kita anggap user login sebagai 'user1' (bukan admin)
                // Admin ditandai dengan role 'admin'
                // Kita set default user biar bisa diakses
                currentUser = { id: 'user1', username: 'demo', role: 'user' };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(currentUser));
            }

            const isAdmin = currentUser.role === 'admin';

            // Data akun (dummy, nanti diambil dari database)
            const dataAkun = {
                namaGame: 'Genshin Impact',
                listJoki: 'Explore x2, Rawat akun 1 bln',
                idGame: '812345678',
                passwordGame: 'rahasia123',
                nickname: 'TravelerPro',
                server: 'Asia',
                loginVia: 'Google',
                statusPembayaran: 'lunas' // atau 'pending'
            };

            const displayFields = {
                namaGame: document.getElementById('displayNamaGame'),
                listJoki: document.getElementById('displayListJoki'),
                idGame: document.getElementById('displayIdGame'),
                passwordGame: document.getElementById('displayPasswordGame'),
                nickname: document.getElementById('displayNickname'),
                server: document.getElementById('displayServer'),
                loginVia: document.getElementById('displayLoginVia'),
                statusPembayaran: document.getElementById('displayStatusPembayaran')
            };

            let editMode = false;

            // Toast
            const toast = document.getElementById('toast');
            let toastTimer;
            function showToast(msg, isError = false) {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + (isError ? 'error' : '');
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // Render data ke tampilan
            function renderDisplay() {
                displayFields.namaGame.textContent = dataAkun.namaGame;
                displayFields.listJoki.textContent = dataAkun.listJoki;
                displayFields.idGame.textContent = dataAkun.idGame;
                displayFields.passwordGame.textContent = editMode ? dataAkun.passwordGame : '••••••••';
                displayFields.nickname.textContent = dataAkun.nickname;
                displayFields.server.textContent = dataAkun.server;
                displayFields.loginVia.textContent = dataAkun.loginVia;
                
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status-badge ' + (dataAkun.statusPembayaran === 'lunas' ? 'status-lunas' : 'status-pending');
                statusSpan.textContent = dataAkun.statusPembayaran === 'lunas' ? 'Lunas ✓' : 'Pending';
                displayFields.statusPembayaran.innerHTML = '';
                displayFields.statusPembayaran.appendChild(statusSpan);
            }

            // Masuk mode edit
            function enterEditMode() {
                editMode = true;
                // Ubah teks jadi input
                const fields = ['namaGame', 'listJoki', 'idGame', 'passwordGame', 'nickname', 'server', 'loginVia'];
                fields.forEach(field => {
                    const currentValue = dataAkun[field];
                    displayFields[field].innerHTML = `<input type="text" id="edit_${field}" value="${currentValue}">`;
                });
                // Status pembayaran pilihan
                const statusOptions = ['lunas', 'pending'];
                let statusHtml = '<select id="edit_statusPembayaran" style="background:#1e1e2e; color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px;">';
                statusOptions.forEach(opt => {
                    statusHtml += `<option value="${opt}" ${dataAkun.statusPembayaran === opt ? 'selected' : ''}>${opt === 'lunas' ? 'Lunas' : 'Pending'}</option>`;
                });
                statusHtml += '</select>';
                displayFields.statusPembayaran.innerHTML = statusHtml;

                document.getElementById('btnEdit').style.display = 'none';
                document.getElementById('btnSimpan').style.display = 'inline-flex';
            }

            // Simpan perubahan
            function saveChanges() {
                const fields = ['namaGame', 'listJoki', 'idGame', 'passwordGame', 'nickname', 'server', 'loginVia'];
                fields.forEach(field => {
                    const input = document.getElementById(`edit_${field}`);
                    if (input) dataAkun[field] = input.value;
                });
                const statusSelect = document.getElementById('edit_statusPembayaran');
                if (statusSelect) dataAkun.statusPembayaran = statusSelect.value;

                editMode = false;
                renderDisplay();
                document.getElementById('btnEdit').style.display = 'inline-flex';
                document.getElementById('btnSimpan').style.display = 'none';
                showToast('Data akun berhasil diperbarui.');
                // Di sini bisa kirim ke server
            }

            // Tampilkan tombol edit jika admin
            if (isAdmin) {
                document.getElementById('editToggle').style.display = 'flex';
            }

            document.getElementById('btnEdit').addEventListener('click', enterEditMode);
            document.getElementById('btnSimpan').addEventListener('click', saveChanges);

            // Render awal
            renderDisplay();

            // Info debug
            console.log('Detail Akun - User:', currentUser, 'Admin:', isAdmin);
        })();
    </script>
</body>
</html>
