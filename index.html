<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Login</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.85);
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --accent-soft: rgba(168, 85, 247, 0.15);
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus-border: #a855f7;
            --danger: #ef4444;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(255, 255, 255, 0.04) inset;
            --shadow-glow: 0 0 60px rgba(168, 85, 247, 0.12), 0 0 120px rgba(168, 85, 247, 0.05);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(168, 85, 247, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 85% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 15% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; opacity: 0.5; animation: floatOrb 12s ease-in-out infinite; }
        .bg-orb.orb-1 { width: 280px; height: 280px; background: rgba(168, 85, 247, 0.13); top: -8%; left: -6%; }
        .bg-orb.orb-2 { width: 200px; height: 200px; background: rgba(99, 102, 241, 0.1); bottom: -10%; right: -5%; animation-delay: -5s; animation-duration: 15s; }
        .bg-orb.orb-3 { width: 160px; height: 160px; background: rgba(192, 132, 252, 0.08); top: 55%; left: 60%; animation-delay: -8s; animation-duration: 18s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(25px, -30px) scale(1.08); }
            50% { transform: translate(-15px, 20px) scale(0.94); }
            75% { transform: translate(-25px, -15px) scale(1.05); }
        }

        .login-card {
            position: relative; z-index: 1; width: 100%; max-width: 420px;
            background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: var(--radius-xl);
            padding: 44px 36px 38px; box-shadow: var(--shadow-card), var(--shadow-glow);
            animation: cardAppear 0.6s ease-out;
        }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .brand-section { text-align: center; margin-bottom: 36px; }
        .store-icon { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: var(--radius-lg); background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); margin-bottom: 16px; font-size: 26px; box-shadow: 0 8px 28px rgba(168, 85, 247, 0.3); }
        .store-name { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.3px; color: #ffffff; line-height: 1.2; }
        .store-name .accent-dot { color: var(--accent); }
        .store-desc { font-size: 0.8rem; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); margin-top: 6px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.4px; color: #c4c4d4; margin-bottom: 7px; text-transform: uppercase; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper .input-icon { position: absolute; left: 16px; font-size: 1.1rem; color: #6b6b80; pointer-events: none; transition: color var(--transition); z-index: 2; }
        .input-wrapper input { width: 100%; padding: 14px 16px 14px 46px; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: var(--radius-md); color: #e8e8f0; font-size: 0.95rem; font-family: inherit; letter-spacing: 0.3px; transition: all var(--transition); outline: none; z-index: 1; }
        .input-wrapper input::placeholder { color: #55556a; letter-spacing: 0.2px; }
        .input-wrapper input:focus { border-color: var(--input-focus-border); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.08); }
        .input-wrapper input:focus+.input-icon, .input-wrapper input:focus~.input-icon { color: var(--accent); }
        .input-wrapper:focus-within .input-icon { color: var(--accent); }

        .toggle-pin { position: absolute; right: 14px; background: none; border: none; color: #6b6b80; cursor: pointer; font-size: 1.1rem; padding: 6px; border-radius: 8px; transition: all var(--transition); z-index: 2; line-height: 1; }
        .toggle-pin:hover { color: #c4c4d4; background: rgba(255, 255, 255, 0.04); }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px 24px; border: none; border-radius: var(--radius-pill); font-size: 0.95rem; font-weight: 600; font-family: inherit; letter-spacing: 0.3px; cursor: pointer; transition: all var(--transition); text-decoration: none; position: relative; overflow: hidden; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); color: #ffffff; box-shadow: 0 6px 24px rgba(168, 85, 247, 0.3); margin-bottom: 12px; }
        .btn-primary:hover { box-shadow: 0 10px 32px rgba(168, 85, 247, 0.45); transform: translateY(-1px); }
        .btn-primary:active { box-shadow: 0 4px 16px rgba(168, 85, 247, 0.25); transform: scale(0.97) translateY(0); }
        .btn-outline { background: transparent; color: #d4d4e0; border: 1.5px solid rgba(255, 255, 255, 0.15); box-shadow: none; }
        .btn-outline:hover { border-color: rgba(255, 255, 255, 0.35); background: rgba(255, 255, 255, 0.03); color: #ffffff; }

        .divider-section { display: flex; align-items: center; gap: 12px; margin: 8px 0 16px; }
        .divider-section .line { flex: 1; height: 1px; background: rgba(255, 255, 255, 0.06); }
        .divider-section span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; color: #5a5a72; white-space: nowrap; }

        .card-footer { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #55556a; letter-spacing: 0.3px; }
        .card-footer .highlight { color: #a0a0b8; font-weight: 500; }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; font-weight: 500; letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            z-index: 100; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239, 68, 68, 0.4); background: #1e1418; color: #fca5a5; }

        @media (max-width: 480px) {
            .login-card { padding: 32px 22px 28px; border-radius: 20px; }
            .store-name { font-size: 1.5rem; }
            .store-desc { font-size: 0.7rem; letter-spacing: 1px; }
            .btn { padding: 14px 20px; font-size: 0.9rem; }
            .input-wrapper input { padding: 13px 14px 13px 42px; font-size: 0.9rem; }
            .bg-orb.orb-1 { width: 180px; height: 180px; top: -5%; left: -10%; }
            .bg-orb.orb-2 { width: 140px; height: 140px; bottom: -6%; right: -12%; }
            .bg-orb.orb-3 { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="toast" id="toast"></div>

    <div class="login-card">
        <div class="brand-section">
            <div class="store-icon">🎮</div>
            <h1 class="store-name">OGURI<span class="accent-dot">.</span>STORE</h1>
            <p class="store-desc">Layanan Jasa Joki Game Online Terpercaya</p>
        </div>

        <form id="loginForm" autocomplete="off" novalidate>
            <div class="form-group">
                <label for="userId">ID Pengguna</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="userId" placeholder="Masukkan ID Anda" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label for="userPin">PIN</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="userPin" placeholder="••••••" required maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    <button type="button" class="toggle-pin" id="togglePinBtn" aria-label="Tampilkan PIN">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="enterBtn">
                <span>↵</span> Enter
            </button>
        </form>

        <div class="divider-section">
            <span class="line"></span>
            <span>atau</span>
            <span class="line"></span>
        </div>

        <a href="buat-tiket.html" class="btn btn-outline" id="buatTiketBtn">
            <span>📋</span> Buat Tiket
        </a>

        <p class="card-footer">
            Belum punya akun? <span class="highlight">Hubungi admin</span> untuk pendaftaran.
        </p>
    </div>

    <script>
        (function() {
            // --- Inisialisasi database user jika belum ada ---
            const USERS_KEY = 'shiroha_users';
            let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
            if (users.length === 0) {
                // Buat admin default dan user demo
                users = [
                    { id: 'admin', username: 'Admin', pin: '1234', role: 'admin' },
                    { id: 'user1', username: 'Demo User', pin: '5678', role: 'user' }
                ];
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }

            // --- DOM Elements ---
            const loginForm = document.getElementById('loginForm');
            const userIdInput = document.getElementById('userId');
            const userPinInput = document.getElementById('userPin');
            const togglePinBtn = document.getElementById('togglePinBtn');
            const toast = document.getElementById('toast');

            // --- Toggle PIN visibility ---
            togglePinBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const isPassword = userPinInput.type === 'password';
                userPinInput.type = isPassword ? 'text' : 'password';
                togglePinBtn.textContent = isPassword ? '🙈' : '👁️';
                userPinInput.focus();
            });

            // --- Filter PIN: hanya angka ---
            userPinInput.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value.length > 6) this.value = this.value.slice(0, 6);
            });

            // --- Toast helper ---
            let toastTimer;
            function showToast(message, isError = false) {
                clearTimeout(toastTimer);
                toast.textContent = message;
                toast.className = 'toast ' + (isError ? 'error' : '');
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // --- Form submit ---
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                // Cek maintenance mode
                if (localStorage.getItem('shiroha_maintenance') === 'true') {
                    const currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser'));
                    if (!currentUser || currentUser.role !== 'admin') {
                        showToast('🔧 Aplikasi sedang dalam maintenance. Coba lagi nanti.', true);
                        return;
                    }
                }

                const idValue = userIdInput.value.trim();
                const pinValue = userPinInput.value.trim();

                if (!idValue) {
                    showToast('⚠️ Mohon masukkan ID Anda.', true);
                    userIdInput.focus();
                    userIdInput.style.borderColor = '#ef4444';
                    setTimeout(() => userIdInput.style.borderColor = '', 800);
                    return;
                }
                if (!pinValue) {
                    showToast('⚠️ Mohon masukkan PIN Anda.', true);
                    userPinInput.focus();
                    userPinInput.style.borderColor = '#ef4444';
                    setTimeout(() => userPinInput.style.borderColor = '', 800);
                    return;
                }
                if (pinValue.length < 4) {
                    showToast('⚠️ PIN minimal 4 digit.', true);
                    userPinInput.focus();
                    userPinInput.style.borderColor = '#ef4444';
                    setTimeout(() => userPinInput.style.borderColor = '', 800);
                    return;
                }

                // Cek user di database
                const foundUser = users.find(u => u.id === idValue && u.pin === pinValue);
                if (!foundUser) {
                    showToast('❌ ID atau PIN salah.', true);
                    return;
                }

                // Simpan sesi login
                localStorage.setItem('shiroha_currentUser', JSON.stringify({
                    id: foundUser.id,
                    username: foundUser.username,
                    role: foundUser.role
                }));

                // Redirect ke dashboard
                window.location.href = 'dashboard.html';
            });

            // --- Keyboard Enter handling ---
            userPinInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });
            userIdInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (userIdInput.value.trim()) {
                        userPinInput.focus();
                    } else {
                        loginForm.dispatchEvent(new Event('submit', { cancelable: true }));
                    }
                }
            });

            console.log('🎮 OGURI STORE - Login page ready.');
        })();
    </script>
</body>
</html>
