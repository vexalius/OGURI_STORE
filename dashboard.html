<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Dashboard</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168, 85, 247, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand h1 {
            font-size: 1.6rem; font-weight: 700; letter-spacing: -0.3px;
            background: linear-gradient(to right, #ffffff, #d8b4fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logout-btn, .update-progress-btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 10px 20px; border-radius: var(--radius-pill);
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all var(--transition);
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .update-progress-btn { background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.2); color: #d8b4fe; margin-right: 8px; }
        .update-progress-btn:hover { background: rgba(168, 85, 247, 0.2); }

        .navbar {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px;
            padding-bottom: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .navbar::-webkit-scrollbar { display: none; }
        .nav-link {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 10px 18px; border-radius: var(--radius-pill);
            font-size: 0.8rem; font-weight: 600; text-decoration: none; white-space: nowrap;
            transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.3px;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(168, 85, 247, 0.12); border-color: rgba(168, 85, 247, 0.3);
            color: #d8b4fe; box-shadow: 0 0 12px rgba(168, 85, 247, 0.1);
        }

        .user-info-bar {
            background: rgba(168, 85, 247, 0.08);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            color: #d8b4fe;
            font-weight: 500;
        }
        .user-info-bar span { font-size: 0.9rem; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), var(--shadow-glow); overflow-x: auto;
        }
        .card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 18px; letter-spacing: -0.2px; }

        .table-wrapper { overflow-x: auto; border-radius: var(--radius-md); }
        table { width: 100%; min-width: 850px; border-collapse: collapse; font-size: 0.85rem; }
        th {
            text-align: left; color: var(--text-secondary); font-weight: 600; font-size: 0.7rem;
            letter-spacing: 0.6px; text-transform: uppercase; padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }

        .status {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem;
            font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
        }
        .status.sedang-joki { background: rgba(34, 197, 94, 0.12); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.25); }
        .status.istirahat { background: rgba(251, 191, 36, 0.12); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.25); }
        .status.belum-mulai { background: rgba(148, 163, 184, 0.1); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.2); }
        .status.selesai { background: rgba(59, 130, 246, 0.12); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.25); }

        .progress-container { width: 100%; max-width: 120px; height: 6px; background: rgba(255, 255, 255, 0.06); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #a855f7, #7c3aed); transition: width 0.4s; }

        .edit-btn {
            background: none; border: 1px solid rgba(255,255,255,0.1); color: #a0a0b8;
            width: 32px; height: 32px; border-radius: 8px; display: inline-flex;
            align-items: center; justify-content: center; cursor: pointer; transition: all var(--transition); font-size: 0.9rem;
        }
        .edit-btn:hover { background: rgba(168, 85, 247, 0.15); border-color: rgba(168, 85, 247, 0.4); color: #d8b4fe; }

        .pembayaran-badge { color: #a3e635; font-weight: 500; font-size: 0.8rem; }
        .pembayaran-pending { color: #fbbf24; }

        /* Modal Edit */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-lg); width: 90%; max-width: 400px; padding: 24px;
        }
        .modal h4 { color: #fff; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input, .form-select {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px; color: #fff;
            font-family: inherit; font-size: 0.85rem; outline: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--accent); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .btn { padding: 10px 18px; border-radius: var(--radius-pill); font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); z-index: 200;
            transition: transform 0.35s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            .navbar { gap: 6px; }
            .nav-link { padding: 8px 14px; font-size: 0.75rem; }
            .card { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand">
                <span style="font-size:1.8rem;">🎮</span>
                <h1>OGURI STORE</h1>
            </div>
            <div style="display: flex; align-items: center;">
                <button class="update-progress-btn" id="updateProgressBtn" style="display: none;">🔄 Perbarui Progress</button>
                <button class="logout-btn" id="logoutBtn"><span>🚪</span> Logout</button>
            </div>
        </div>

        <nav class="navbar" id="navbar"></nav>

        <!-- Info ringkasan hanya untuk user biasa -->
        <div class="user-info-bar" id="userInfoBar" style="display: none;">
            <span>📊 <strong id="infoBerlangsung">BERLANGSUNG: 0</strong></span>
            <span>✅ <strong id="infoSelesai">SELESAI: 0</strong></span>
        </div>

        <div class="card">
            <h2>📋 Progres Joki</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Game</th>
                            <th>List Joki</th>
                            <th>Status</th>
                            <th>Progress</th>
                            <th>Mulai</th>
                            <th>Berakhir</th>
                            <th>Pembayaran</th>
                            <th id="editColHeader">Edit</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" style="text-align:center;color:#6b6b80;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Edit Progres -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h4>✏️ Edit Progres Joki</h4>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Nama Game</label>
                <input type="text" class="form-input" id="editNamaGame" readonly>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select class="form-select" id="editStatus">
                    <option value="belum_mulai">Belum Mulai</option>
                    <option value="sedang">Sedang Joki</option>
                    <option value="istirahat">Istirahat</option>
                    <option value="selesai">Selesai</option>
                </select>
            </div>
            <div class="form-group">
                <label>Progress (%)</label>
                <input type="range" class="form-input" id="editProgress" min="0" max="100" value="0" style="padding:0;">
                <span id="progressValue" style="font-size:0.8rem; color:#d8b4fe;">0%</span>
            </div>
            <div class="form-group">
                <label>Tanggal Mulai</label>
                <input type="date" class="form-input" id="editTglMulai">
            </div>
            <div class="form-group">
                <label>Tanggal Berakhir</label>
                <input type="date" class="form-input" id="editTglBerakhir">
            </div>
            <div class="form-group">
                <label>Pembayaran</label>
                <select class="form-select" id="editPembayaran">
                    <option value="Lunas ✓">Lunas</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="closeEditModal">Batal</button>
                <button class="btn btn-primary" id="saveEdit">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const toast = document.getElementById('toast');
            function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

            let currentUser = null;
            try { currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser')); } catch(e) {}
            if (!currentUser) { window.location.href = 'index.html'; return; }
            const isAdmin = currentUser.role === 'admin';

            if (isAdmin) document.getElementById('updateProgressBtn').style.display = 'inline-flex';

            // Navigasi
            const navbar = document.getElementById('navbar');
            const menuItems = [
                { href: 'detail-akun.html', icon: '👤', text: 'Detail Akun' },
                { href: 'keluhan.html', icon: '📢', text: 'Keluhan' },
                { href: 'chat.html', icon: '💬', text: 'Chat' },
                { href: 'status-joki.html', icon: '📊', text: 'Status Joki' },
                { href: 'gamelist.html', icon: '🎮', text: 'Game/List' },
                { href: 'memberlist.html', icon: '👥', text: 'List Member' },
                { href: 'struk.html', icon: '🧾', text: 'Struk' },
                { href: 'transaksi.html', icon: '💳', text: 'Transaksi' }
            ];
            if (isAdmin) menuItems.push({ href: 'pengaturan.html', icon: '⚙️', text: 'Pengaturan' });
            navbar.innerHTML = menuItems.map(i => `<a href="${i.href}" class="nav-link">${i.icon} ${i.text}</a>`).join('');

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('shiroha_currentUser');
                window.location.href = 'index.html';
            });

            // Data Joki
            const JOKI_KEY = 'shiroha_joki_data';
            function getJoki() { try { return JSON.parse(localStorage.getItem(JOKI_KEY)) || []; } catch(e) { return []; } }
            function saveJoki(data) { localStorage.setItem(JOKI_KEY, JSON.stringify(data)); }

            const editModal = document.getElementById('editModal');
            const editId = document.getElementById('editId');
            const editNamaGame = document.getElementById('editNamaGame');
            const editStatus = document.getElementById('editStatus');
            const editProgress = document.getElementById('editProgress');
            const progressValue = document.getElementById('progressValue');
            const editTglMulai = document.getElementById('editTglMulai');
            const editTglBerakhir = document.getElementById('editTglBerakhir');
            const editPembayaran = document.getElementById('editPembayaran');

            editProgress.addEventListener('input', () => progressValue.textContent = editProgress.value + '%');

            function renderTable() {
                const allData = getJoki();
                // Data milik user atau semua untuk admin
                const userData = isAdmin ? allData : allData.filter(j => j.userId === currentUser.id);
                
                // Untuk user biasa: info ringkasan
                if (!isAdmin) {
                    const berlangsung = userData.filter(j => j.status !== 'selesai').length;
                    const selesai = userData.filter(j => j.status === 'selesai').length;
                    document.getElementById('infoBerlangsung').textContent = `BERLANGSUNG: ${berlangsung}`;
                    document.getElementById('infoSelesai').textContent = `SELESAI: ${selesai}`;
                    document.getElementById('userInfoBar').style.display = 'flex';
                } else {
                    document.getElementById('userInfoBar').style.display = 'none';
                }

                // Data yang ditampilkan di tabel: untuk user -> hanya yang bukan selesai, admin -> semua
                const displayData = isAdmin ? userData : userData.filter(j => j.status !== 'selesai');

                const tbody = document.getElementById('tableBody');
                const editCol = document.getElementById('editColHeader');
                if (!isAdmin) editCol.style.display = 'none'; else editCol.style.display = '';

                if (displayData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#6b6b80;">Tidak ada joki aktif.</td></tr>';
                    return;
                }

                tbody.innerHTML = displayData.map(j => {
                    const sc = { sedang:'sedang-joki', istirahat:'istirahat', belum_mulai:'belum-mulai', selesai:'selesai' }[j.status] || 'belum-mulai';
                    const st = { sedang:'Sedang Joki', istirahat:'Istirahat', belum_mulai:'Belum Mulai', selesai:'Selesai' }[j.status] || 'Belum Mulai';
                    const pembayaran = j.pembayaran || 'Lunas ✓';
                    const pClass = pembayaran.includes('Lunas') ? 'pembayaran-badge' : 'pembayaran-pending';
                    return `<tr>
                        <td><strong>${j.namaGame}</strong></td>
                        <td>${j.listJoki}</td>
                        <td><span class="status ${sc}">${st}</span></td>
                        <td><div class="progress-container"><div class="progress-fill" style="width:${j.progress||0}%; ${j.status==='selesai'?'background:#4ade80;':''}"></div></div> <span style="font-size:0.7rem;margin-left:6px;">${j.progress||0}%</span></td>
                        <td>${j.tglMulai||'-'}</td>
                        <td>${j.tglBerakhir||'-'}</td>
                        <td><span class="${pClass}">${pembayaran}</span></td>
                        ${isAdmin ? `<td><button class="edit-btn" data-id="${j.id}">✏️</button></td>` : ''}
                    </tr>`;
                }).join('');

                if (isAdmin) {
                    document.querySelectorAll('.edit-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = this.dataset.id;
                            const data = getJoki();
                            const item = data.find(j => j.id == id);
                            if (!item) return;
                            editId.value = item.id;
                            editNamaGame.value = item.namaGame;
                            editStatus.value = item.status;
                            editProgress.value = item.progress || 0;
                            progressValue.textContent = (item.progress || 0) + '%';
                            const parseDate = (str) => {
                                if (!str || str === '-') return '';
                                const parts = str.split('/');
                                if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                                return str;
                            };
                            editTglMulai.value = parseDate(item.tglMulai);
                            editTglBerakhir.value = parseDate(item.tglBerakhir);
                            editPembayaran.value = item.pembayaran || 'Lunas ✓';
                            editModal.style.display = 'flex';
                        });
                    });
                }
            }

            document.getElementById('closeEditModal').addEventListener('click', () => editModal.style.display = 'none');
            document.getElementById('saveEdit').addEventListener('click', () => {
                const id = editId.value;
                const data = getJoki();
                const item = data.find(j => j.id == id);
                if (!item) return;
                item.status = editStatus.value;
                item.progress = parseInt(editProgress.value);
                if (item.status === 'selesai') item.progress = 100;
                if (item.status === 'belum_mulai') item.progress = 0;
                const formatDate = (val) => {
                    if (!val) return '-';
                    const d = new Date(val);
                    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
                };
                item.tglMulai = formatDate(editTglMulai.value);
                item.tglBerakhir = formatDate(editTglBerakhir.value);
                item.pembayaran = editPembayaran.value;
                saveJoki(data);
                editModal.style.display = 'none';
                renderTable();
                showToast('Data berhasil diperbarui.');
            });

            document.getElementById('updateProgressBtn').addEventListener('click', () => {
                const data = getJoki();
                let count = 0;
                data.forEach(j => {
                    if (j.status === 'sedang') { j.progress = Math.min(99, (j.progress||0)+5); count++; }
                });
                if (count) { saveJoki(data); renderTable(); showToast(`Progress diperbarui untuk ${count} joki.`); }
                else showToast('Tidak ada joki dengan status Sedang Joki.');
            });

            renderTable();
        })();
    </script>
</body>
</html>
