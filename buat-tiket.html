<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Buat Tiket</title>
    <style>
        /* ... (style sama seperti sebelumnya, tidak berubah) ... */
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.85);
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus-border: #a855f7;
            --danger: #ef4444;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.5), 0 1px 3px rgba(255, 255, 255, 0.04) inset;
            --shadow-glow: 0 0 60px rgba(168, 85, 247, 0.12);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(168, 85, 247, 0.08) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 15% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        /* ... semua style sama seperti sebelumnya ... */
    </style>
</head>
<body>
    <!-- Toast dan background orbs -->
    <div class="toast" id="toast"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="app-card" id="appCard">
        <!-- Step 1: Choice -->
        <div id="stepChoice" class="step">
            <h2 class="step-title">📋 Buat Tiket</h2>
            <p class="step-subtitle">OGURI STORE - Silakan pilih status Anda</p>
            <button class="btn btn-primary" id="btnAlreadyHave">✅ Sudah Memiliki ID</button>
            <div style="height:12px;"></div>
            <button class="btn btn-outline" id="btnNewUser">🆕 Belum Memiliki ID</button>
        </div>

        <!-- Step 2: Register -->
        <div id="stepRegister" class="step hidden">
            <h2 class="step-title">📝 Daftar Akun Baru</h2>
            <div class="form-group"><label>ID Pengguna</label><div class="input-wrapper"><input type="text" id="regId" placeholder="Masukkan ID"></div></div>
            <div class="form-group"><label>Username</label><div class="input-wrapper"><input type="text" id="regUsername" placeholder="Nama panggilan"></div></div>
            <div class="form-group"><label>PIN (min. 4 digit angka)</label><div class="input-wrapper"><input type="password" id="regPin" placeholder="PIN" maxlength="6" inputmode="numeric"></div></div>
            <div class="btn-row">
                <button class="btn btn-outline btn-small" id="regBack">⬅ Kembali</button>
                <button class="btn btn-primary btn-small" id="regSubmit">Daftar & Lanjut</button>
            </div>
        </div>

        <!-- Step 3: Login Existing -->
        <div id="stepLoginExisting" class="step hidden">
            <h2 class="step-title">🔐 Login</h2>
            <div class="form-group"><label>ID</label><div class="input-wrapper"><input type="text" id="loginId" placeholder="ID Anda"></div></div>
            <div class="form-group"><label>PIN</label><div class="input-wrapper"><input type="password" id="loginPin" placeholder="PIN" maxlength="6"></div></div>
            <div class="btn-row">
                <button class="btn btn-outline btn-small" id="loginBack">⬅ Kembali</button>
                <button class="btn btn-primary btn-small" id="loginSubmit">Masuk</button>
            </div>
        </div>

        <!-- Step 4: Informasi Order -->
        <!-- ... (sama seperti sebelumnya) ... -->

        <!-- Step 5: Informasi Pembayaran -->
        <!-- ... (sama seperti sebelumnya) ... -->

        <!-- Step 6: Receipt -->
        <div id="stepReceipt" class="step hidden">
            <h2 class="step-title">🧾 Struk Pemesanan</h2>
            <div id="receiptContent" class="receipt-card"></div>
            <div class="btn-row" style="margin-top:20px;">
                <button class="btn btn-primary" id="toDashboard">🏠 Menu Utama</button>
                <button class="btn btn-danger" id="toLogout">🚪 Logout</button>
            </div>
        </div>
    </div>

    <!-- Modal Popup Global -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal" id="modalBox"></div>
    </div>

    <script>
        (function() {
            // --- Database User & Transaksi ---
            const USERS_KEY = 'shiroha_users';
            const PENDING_KEY = 'shiroha_transaksi_pending';

            // Fungsi bantu
            function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; }
            function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
            function getPendingTransactions() { return JSON.parse(localStorage.getItem(PENDING_KEY)) || []; }
            function savePendingTransaction(ticket) {
                const pending = getPendingTransactions();
                pending.push(ticket);
                localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
            }

            // Data game dan joki statis (sama seperti sebelumnya)
            const gameList = [ /* ... */ ];
            const jokiServices = [ /* ... */ ];
            const bankAdmins = [ /* ... */ ];
            const ewalletAdmins = [ /* ... */ ];

            const state = {
                currentStep: 'choice',
                user: null,
                order: { nama: '', game: null, jokiItems: [], total: 0 },
                payment: { via: '', rekAdmin: null, namaPengirim: '', norekPengirim: '' }
            };

            // ... (logika step, modal, dll. Sama seperti sebelumnya, dengan penyesuaian) ...

            // Register
            document.getElementById('regSubmit').addEventListener('click', () => {
                const id = document.getElementById('regId').value.trim();
                const username = document.getElementById('regUsername').value.trim();
                const pin = document.getElementById('regPin').value.trim();
                if (!id || !username || !pin || pin.length < 4 || !/^\d+$/.test(pin)) {
                    showToast('Mohon isi semua data dengan benar. PIN minimal 4 digit angka.', true);
                    return;
                }
                const users = getUsers();
                if (users.find(u => u.id === id)) {
                    showToast('ID sudah digunakan.', true);
                    return;
                }
                const newUser = { id, username, pin, role: 'user' };
                users.push(newUser);
                saveUsers(users);
                state.user = { id, username, role: 'user' };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(state.user));
                state.order.nama = username;
                document.getElementById('namaPembeli').value = username;
                showStep('order');
            });

            // Login Existing
            document.getElementById('loginSubmit').addEventListener('click', () => {
                const id = document.getElementById('loginId').value.trim();
                const pin = document.getElementById('loginPin').value.trim();
                if (!id || !pin) { showToast('ID dan PIN harus diisi.', true); return; }
                const users = getUsers();
                const found = users.find(u => u.id === id && u.pin === pin);
                if (!found) { showToast('ID atau PIN salah.', true); return; }
                state.user = { id: found.id, username: found.username, role: found.role };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(state.user));
                state.order.nama = found.username;
                document.getElementById('namaPembeli').value = found.username;
                showStep('order');
            });

            // ... (sisanya sama, tetapi ketika selesai dan klik "Menu Utama" atau simpan struk, tiket disimpan ke pending) ...

            // Saat klik "Menu Utama" dari struk
            document.getElementById('toDashboard').addEventListener('click', () => {
                // Simpan tiket ke pending
                const ticket = {
                    id: 'TKT-' + Date.now(),
                    userId: state.user.id,
                    namaPembeli: state.order.nama,
                    game: state.order.game,
                    jokiItems: state.order.jokiItems,
                    total: state.order.total,
                    payment: state.payment,
                    timestamp: Date.now()
                };
                savePendingTransaction(ticket);
                window.location.href = 'dashboard.html';
            });

            // Logout
            document.getElementById('toLogout').addEventListener('click', () => {
                localStorage.removeItem('shiroha_currentUser');
                window.location.href = 'login.html';
            });

            // Inisialisasi
            showStep('choice');
            updateRekAdminVisibility();
        })();
    </script>
</body>
</html>
