<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Buat Tiket</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.85);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus-border: #a855f7;
            --radius-xl: 24px; --radius-lg: 16px; --radius-md: 12px; --radius-pill: 50px;
            --shadow-card: 0 8px 40px rgba(0,0,0,0.5), 0 1px 3px rgba(255,255,255,0.04) inset;
            --shadow-glow: 0 0 60px rgba(168,85,247,0.12); --transition: 0.25s;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(168,85,247,0.08) 0%, transparent 70%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .bg-orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; opacity:0.45; animation:floatOrb 12s infinite; }
        .bg-orb.orb-1 { width:260px; height:260px; background:rgba(168,85,247,0.12); top:-8%; left:-6%; }
        .bg-orb.orb-2 { width:180px; height:180px; background:rgba(99,102,241,0.09); bottom:-10%; right:-5%; animation-delay:-5s; animation-duration:15s; }
        @keyframes floatOrb { 0%,100%{ transform:translate(0,0) scale(1); } 25%{ transform:translate(22px,-28px) scale(1.07); } 50%{ transform:translate(-14px,18px) scale(0.95); } 75%{ transform:translate(-22px,-14px) scale(1.04); } }

        .toast { position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-120px); background:#1e1e2e; color:#f1f1f3; padding:12px 22px; border-radius:var(--radius-pill); font-size:0.85rem; border:1px solid rgba(255,255,255,0.08); z-index:200; transition:0.35s; pointer-events:none; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.error { border-color:rgba(239,68,68,0.4); background:#1e1418; color:#fca5a5; }

        .app-card { position:relative; z-index:1; width:100%; max-width:480px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-xl); padding:36px 28px 32px; box-shadow:var(--shadow-card),var(--shadow-glow); animation:cardAppear 0.5s ease-out; }
        @keyframes cardAppear { from{opacity:0;transform:translateY(28px)scale(0.96);} to{opacity:1;transform:translateY(0)scale(1);} }

        .step-title { font-size:1.5rem; font-weight:700; color:#fff; margin-bottom:8px; }
        .step-subtitle { font-size:0.8rem; color:var(--text-secondary); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:24px; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:15px 20px; border:none; border-radius:var(--radius-pill); font-size:0.95rem; font-weight:600; cursor:pointer; transition:all var(--transition); text-decoration:none; background:transparent; }
        .btn-primary { background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; box-shadow:0 6px 24px rgba(168,85,247,0.3); }
        .btn-outline { border:1.5px solid rgba(255,255,255,0.15); color:#d4d4e0; }
        .btn-small { padding:10px 16px; font-size:0.85rem; width:auto; }
        .btn-danger { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; }
        .btn-row { display:flex; gap:12px; margin-top:20px; }
        .btn-row .btn { flex:1; }

        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:0.8rem; font-weight:600; color:#c4c4d4; margin-bottom:6px; text-transform:uppercase; }
        .input-wrapper { position:relative; display:flex; align-items:center; }
        .input-wrapper input, .fake-input { width:100%; padding:13px 14px; background:var(--input-bg); border:1.5px solid var(--input-border); border-radius:var(--radius-md); color:#e8e8f0; font-size:0.9rem; outline:none; transition:all var(--transition); }
        .fake-input { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; min-height:48px; }
        .fake-input span { color:#f1f1f3; }
        .fake-input .placeholder { color:#55556a; }
        .input-wrapper input:focus { border-color:var(--input-focus-border); background:rgba(255,255,255,0.06); box-shadow:0 0 0 4px rgba(168,85,247,0.08); }

        .tag-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
        .tag { background:rgba(168,85,247,0.15); color:#d8b4fe; padding:6px 12px; border-radius:20px; font-size:0.8rem; display:inline-flex; align-items:center; gap:6px; }
        .tag button { background:none; border:none; color:#fca5a5; cursor:pointer; font-size:1.1rem; }

        .total-display { font-size:1rem; font-weight:600; color:#fff; margin-top:8px; background:rgba(168,85,247,0.08); padding:10px 14px; border-radius:var(--radius-md); }

        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:100; }
        .modal { background:#1a1a2e; border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius-lg); width:90%; max-width:360px; padding:24px; }
        .modal h4 { color:#fff; margin-bottom:16px; }
        .modal-list { max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
        .modal-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:rgba(255,255,255,0.03); border-radius:10px; cursor:pointer; }
        .modal-item:hover { background:rgba(255,255,255,0.06); }
        .modal-item span { color:#fff; }
        .modal-item input[type="radio"], .modal-item input[type="checkbox"] { accent-color:#a855f7; width:18px; height:18px; }
        .modal-qty { display:flex; align-items:center; gap:6px; margin-left:auto; }
        .modal-qty input { width:50px; padding:6px; background:var(--input-bg); border:1px solid var(--input-border); border-radius:8px; color:#fff; text-align:center; }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; }

        .receipt-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:20px; color:#f1f1f3; font-size:0.9rem; line-height:1.9; }
        .receipt-card .label { color:#a0a0b8; font-size:0.75rem; text-transform:uppercase; }
        .receipt-card .value { color:#fff; font-weight:500; }

        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div>
    <div class="toast" id="toast"></div>

    <div class="app-card" id="appCard">
        <div id="stepChoice" class="step"><h2 class="step-title">📋 Buat Tiket</h2><p class="step-subtitle">OGURI STORE - Silakan pilih status Anda</p><button class="btn btn-primary" id="btnAlreadyHave">✅ Sudah Memiliki ID</button><div style="height:12px;"></div><button class="btn btn-outline" id="btnNewUser">🆕 Belum Memiliki ID</button></div>
        <div id="stepRegister" class="step hidden"><h2 class="step-title">📝 Daftar Akun Baru</h2><div class="form-group"><label>ID Pengguna</label><input type="text" id="regId" placeholder="Masukkan ID"></div><div class="form-group"><label>Username</label><input type="text" id="regUsername" placeholder="Nama panggilan"></div><div class="form-group"><label>PIN (min. 4 digit angka)</label><input type="password" id="regPin" placeholder="PIN" maxlength="6"></div><div class="btn-row"><button class="btn btn-outline btn-small" id="regBack">⬅ Kembali</button><button class="btn btn-primary btn-small" id="regSubmit">Daftar & Lanjut</button></div></div>
        <div id="stepLoginExisting" class="step hidden"><h2 class="step-title">🔐 Login</h2><div class="form-group"><label>ID</label><input type="text" id="loginId" placeholder="ID Anda"></div><div class="form-group"><label>PIN</label><input type="password" id="loginPin" placeholder="PIN" maxlength="6"></div><div class="btn-row"><button class="btn btn-outline btn-small" id="loginBack">⬅ Kembali</button><button class="btn btn-primary btn-small" id="loginSubmit">Masuk</button></div></div>
        <div id="stepOrder" class="step hidden"><h2 class="step-title">📦 Informasi Order</h2><div class="form-group"><label>Nama Pembeli</label><input type="text" id="namaPembeli" placeholder="Nama Anda"></div><div class="form-group"><label>Game</label><div class="fake-input" id="gameSelector"><span id="gameSelectedText" class="placeholder">Pilih game...</span><span>🔽</span></div></div><div class="form-group"><label>Layanan Joki</label><div class="fake-input" id="jokiSelector"><span id="jokiSelectedText" class="placeholder">Pilih layanan...</span><span>🔽</span></div><div class="tag-list" id="selectedJokiTags"></div></div><div class="total-display" id="totalOrderDisplay">Total: Rp 0</div><div class="btn-row"><button class="btn btn-outline btn-small" id="orderBack">⬅ Kembali</button><button class="btn btn-primary btn-small" id="orderNext">Lanjut ➡</button></div></div>
        <div id="stepPayment" class="step hidden"><h2 class="step-title">💳 Informasi Pembayaran</h2><div class="form-group"><label>Via Pembayaran</label><div class="fake-input" id="viaSelector"><span id="viaSelectedText" class="placeholder">Pilih Bank/E-wallet...</span><span>🔽</span></div></div><div class="form-group" id="rekAdminGroup"><label>Rekening Admin Tujuan</label><div class="fake-input" id="rekAdminSelector"><span id="rekAdminSelectedText" class="placeholder">Pilih rekening admin...</span><span>🔽</span></div></div><div class="form-group"><label>Nama Pengirim</label><input type="text" id="namaPengirim" placeholder="Nama Anda"></div><div class="form-group"><label>Nomor Rekening Pengirim</label><input type="text" id="norekPengirim" placeholder="Nomor rekening/HP"></div><div class="form-group"><label>Total Nominal</label><input type="text" id="totalNominal" readonly placeholder="Otomatis terisi"></div><div class="btn-row"><button class="btn btn-outline btn-small" id="paymentBack">⬅ Kembali</button><button class="btn btn-primary btn-small" id="paymentNext">Lanjut ➡</button></div></div>
        <div id="stepReceipt" class="step hidden"><h2 class="step-title">🧾 Struk Pemesanan</h2><div id="receiptContent" class="receipt-card"></div><div class="btn-row"><button class="btn btn-primary" id="toDashboard">🏠 Menu Utama</button><button class="btn btn-danger" id="toLogout">🚪 Logout</button></div></div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden"><div class="modal" id="modalBox"></div></div>

    <script>
        (function() {
            // Data dari localStorage
            const gameList = JSON.parse(localStorage.getItem('shiroha_game_list')) || [];
            const jokiServices = JSON.parse(localStorage.getItem('shiroha_joki_services')) || [];
            const rekeningAdmin = JSON.parse(localStorage.getItem('shiroha_rekening_admin')) || [];

            const USERS_KEY = 'shiroha_users';
            const PENDING_KEY = 'shiroha_transaksi_pending';

            const state = { currentStep: 'choice', user: null, order: { nama: '', game: null, jokiItems: [], total: 0 }, payment: { via: '', rekAdmin: null, namaPengirim: '', norekPengirim: '' } };

            const toast = document.getElementById('toast');
            function showToast(msg, isErr) { toast.textContent = msg; toast.className = 'toast' + (isErr ? ' error' : ''); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

            function showStep(name) {
                if ((name === 'register' || name === 'loginExisting' || name === 'order') && localStorage.getItem('shiroha_maintenance') === 'true' && (!state.user || state.user.role !== 'admin')) {
                    showToast('🔧 Aplikasi sedang maintenance.', true); return;
                }
                document.querySelectorAll('.step').forEach(s => s.classList.add('hidden'));
                document.getElementById('step' + name.charAt(0).toUpperCase() + name.slice(1)).classList.remove('hidden');
                state.currentStep = name;
                if (name === 'order') updateOrderTotal();
                if (name === 'payment') { document.getElementById('totalNominal').value = 'Rp ' + state.order.total.toLocaleString('id-ID'); updateRekAdminVisibility(); }
                if (name === 'receipt') renderReceipt();
            }

            // Modal helper
            const modalOverlay = document.getElementById('modalOverlay');
            function showModal(html) { document.getElementById('modalBox').innerHTML = html; modalOverlay.classList.remove('hidden'); }
            function closeModal() { modalOverlay.classList.add('hidden'); }
            modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

            // Step Choice
            document.getElementById('btnAlreadyHave').addEventListener('click', () => showStep('loginExisting'));
            document.getElementById('btnNewUser').addEventListener('click', () => showStep('register'));

            // Register
            document.getElementById('regBack').addEventListener('click', () => showStep('choice'));
            document.getElementById('regSubmit').addEventListener('click', () => {
                const id = document.getElementById('regId').value.trim(), username = document.getElementById('regUsername').value.trim(), pin = document.getElementById('regPin').value.trim();
                if (!id || !username || !pin || pin.length < 4 || !/^\d+$/.test(pin)) { showToast('Data tidak valid.', true); return; }
                let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
                if (users.find(u => u.id === id)) { showToast('ID sudah digunakan.', true); return; }
                const newUser = { id, username, pin, role: 'user' };
                users.push(newUser); localStorage.setItem(USERS_KEY, JSON.stringify(users));
                state.user = { id, username, role: 'user' };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(state.user));
                state.order.nama = username; document.getElementById('namaPembeli').value = username;
                showStep('order');
            });

            // Login
            document.getElementById('loginBack').addEventListener('click', () => showStep('choice'));
            document.getElementById('loginSubmit').addEventListener('click', () => {
                const id = document.getElementById('loginId').value.trim(), pin = document.getElementById('loginPin').value.trim();
                if (!id || !pin) { showToast('ID dan PIN harus diisi.', true); return; }
                const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
                const found = users.find(u => u.id === id && u.pin === pin);
                if (!found) { showToast('ID atau PIN salah.', true); return; }
                state.user = { id: found.id, username: found.username, role: found.role };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(state.user));
                state.order.nama = found.username; document.getElementById('namaPembeli').value = found.username;
                showStep('order');
            });

            // Order Step
            document.getElementById('orderBack').addEventListener('click', () => showStep('choice'));
            document.getElementById('orderNext').addEventListener('click', () => {
                state.order.nama = document.getElementById('namaPembeli').value.trim();
                if (!state.order.nama || !state.order.game || state.order.jokiItems.length === 0) { showToast('Lengkapi data.', true); return; }
                showStep('payment');
            });

            // Game selector (popup dari gameList)
            document.getElementById('gameSelector').addEventListener('click', () => {
                let html = '<h4>Pilih Game</h4><div class="modal-list">';
                gameList.forEach(g => html += `<div class="modal-item"><input type="radio" name="gameRadio" value="${g.id}" ${state.order.game?.id===g.id?'checked':''}> <span>${g.nama}</span></div>`);
                html += '</div><div class="modal-actions"><button class="btn btn-outline btn-small" id="modalCancelGame">Batal</button><button class="btn btn-primary btn-small" id="modalConfirmGame">Pilih</button></div>';
                showModal(html);
                document.getElementById('modalCancelGame').addEventListener('click', closeModal);
                document.getElementById('modalConfirmGame').addEventListener('click', () => {
                    const sel = document.querySelector('input[name="gameRadio"]:checked');
                    if (sel) { state.order.game = gameList.find(g => g.id == sel.value); document.getElementById('gameSelectedText').textContent = state.order.game.nama; document.getElementById('gameSelectedText').classList.remove('placeholder'); updateOrderTotal(); }
                    closeModal();
                });
            });

            // Joki selector (popup dari jokiServices)
            document.getElementById('jokiSelector').addEventListener('click', () => {
                if (!state.order.game) { showToast('Pilih game terlebih dahulu.', true); return; }
                const gameJoki = jokiServices.filter(j => j.gameId === state.order.game.id);
                let html = '<h4>Pilih Layanan</h4><div class="modal-list">';
                gameJoki.forEach(s => {
                    const existing = state.order.jokiItems.find(i => i.service.id === s.id);
                    html += `<div class="modal-item"><input type="checkbox" value="${s.id}" ${existing?'checked':''}> <span>${s.nama} (Rp ${s.harga.toLocaleString('id-ID')})</span><div class="modal-qty"><span>Qty:</span><input type="number" min="1" value="${existing?existing.qty:1}" class="qty-input" data-service="${s.id}"></div></div>`;
                });
                html += '</div><div class="modal-actions"><button class="btn btn-outline btn-small" id="modalCancelJoki">Batal</button><button class="btn btn-primary btn-small" id="modalConfirmJoki">Simpan</button></div>';
                showModal(html);
                document.getElementById('modalCancelJoki').addEventListener('click', closeModal);
                document.getElementById('modalConfirmJoki').addEventListener('click', () => {
                    const items = []; document.querySelectorAll('#modalBox input[type="checkbox"]:checked').forEach(cb => {
                        const sid = parseInt(cb.value); const qty = parseInt(cb.closest('.modal-item').querySelector('.qty-input').value) || 1;
                        items.push({ service: jokiServices.find(s => s.id === sid), qty });
                    });
                    state.order.jokiItems = items; renderJokiTags(); updateOrderTotal(); closeModal();
                });
            });

            function renderJokiTags() {
                document.getElementById('selectedJokiTags').innerHTML = state.order.jokiItems.map(i => `<span class="tag">${i.service.nama} x${i.qty} <button data-remove="${i.service.id}">✕</button></span>`).join('');
                document.querySelectorAll('.tag button').forEach(b => b.addEventListener('click', e => {
                    state.order.jokiItems = state.order.jokiItems.filter(i => i.service.id != e.target.dataset.remove); renderJokiTags(); updateOrderTotal();
                }));
                document.getElementById('jokiSelectedText').textContent = state.order.jokiItems.length ? state.order.jokiItems.map(i => i.service.nama).join(', ') : 'Pilih layanan...';
            }

            function updateOrderTotal() { let t=0; state.order.jokiItems.forEach(i => t += i.service.harga * i.qty); state.order.total = t; document.getElementById('totalOrderDisplay').textContent = 'Total: Rp '+t.toLocaleString('id-ID'); }
            document.getElementById('namaPembeli').addEventListener('input', e => state.order.nama = e.target.value);

            // Payment
            document.getElementById('paymentBack').addEventListener('click', () => showStep('order'));
            document.getElementById('paymentNext').addEventListener('click', () => {
                if (!state.payment.via || !state.payment.rekAdmin || !state.payment.namaPengirim || !state.payment.norekPengirim) { showToast('Lengkapi data pembayaran.', true); return; }
                showStep('receipt');
            });
            document.getElementById('viaSelector').addEventListener('click', () => {
                showModal(`<h4>Pilih Metode</h4><div class="modal-list"><div class="modal-item"><input type="radio" name="viaRadio" value="bank" ${state.payment.via==='bank'?'checked':''}> <span>🏦 Bank</span></div><div class="modal-item"><input type="radio" name="viaRadio" value="ewallet" ${state.payment.via==='ewallet'?'checked':''}> <span>💰 E-Wallet</span></div></div><div class="modal-actions"><button class="btn btn-outline btn-small" id="modalCancelVia">Batal</button><button class="btn btn-primary btn-small" id="modalConfirmVia">Pilih</button></div>`);
                document.getElementById('modalCancelVia').addEventListener('click', closeModal);
                document.getElementById('modalConfirmVia').addEventListener('click', () => {
                    const sel = document.querySelector('input[name="viaRadio"]:checked');
                    if (sel) { state.payment.via = sel.value; document.getElementById('viaSelectedText').textContent = sel.value==='bank'?'Bank':'E-Wallet'; state.payment.rekAdmin = null; document.getElementById('rekAdminSelectedText').textContent = 'Pilih rekening admin...'; updateRekAdminVisibility(); }
                    closeModal();
                });
            });
            function updateRekAdminVisibility() { document.getElementById('rekAdminGroup').style.display = state.payment.via ? 'block' : 'none'; }
            document.getElementById('rekAdminSelector').addEventListener('click', () => {
                if (!state.payment.via) { showToast('Pilih metode pembayaran dulu.', true); return; }
                const list = rekeningAdmin.filter(r => r.jenis === state.payment.via);
                let html = '<h4>Pilih Rekening Admin</h4><div class="modal-list">';
                list.forEach(r => html += `<div class="modal-item"><input type="radio" name="rekRadio" value="${r.id}" ${state.payment.rekAdmin?.id===r.id?'checked':''}> <span>${r.nama} - ${r.nomor} a/n ${r.atasNama}</span></div>`);
                html += '</div><div class="modal-actions"><button class="btn btn-outline btn-small" id="modalCancelRek">Batal</button><button class="btn btn-primary btn-small" id="modalConfirmRek">Pilih</button></div>';
                showModal(html);
                document.getElementById('modalCancelRek').addEventListener('click', closeModal);
                document.getElementById('modalConfirmRek').addEventListener('click', () => {
                    const sel = document.querySelector('input[name="rekRadio"]:checked');
                    if (sel) { state.payment.rekAdmin = list.find(r => r.id == sel.value); document.getElementById('rekAdminSelectedText').textContent = `${state.payment.rekAdmin.nama} - ${state.payment.rekAdmin.nomor}`; }
                    closeModal();
                });
            });
            document.getElementById('namaPengirim').addEventListener('input', e => state.payment.namaPengirim = e.target.value);
            document.getElementById('norekPengirim').addEventListener('input', e => state.payment.norekPengirim = e.target.value);

            function renderReceipt() {
                document.getElementById('receiptContent').innerHTML = `
                    <div class="label">ID</div><div class="value">${state.user.id}</div>
                    <div class="label">Pembeli</div><div class="value">${state.order.nama}</div>
                    <div class="label">Game</div><div class="value">${state.order.game?.nama}</div>
                    <div class="label">Layanan</div><div class="value">${state.order.jokiItems.map(i => i.service.nama + ' x' + i.qty).join(', ')}</div>
                    <div class="label">Total</div><div class="value">Rp ${state.order.total.toLocaleString('id-ID')}</div>
                    <div class="label">Via</div><div class="value">${state.payment.via}</div>
                    <div class="label">Rek Admin</div><div class="value">${state.payment.rekAdmin?.nama} - ${state.payment.rekAdmin?.nomor}</div>
                    <div class="label">Pengirim</div><div class="value">${state.payment.namaPengirim} (${state.payment.norekPengirim})</div>
                `;
            }

            document.getElementById('toDashboard').addEventListener('click', () => {
                const ticket = { id: 'TKT-'+Date.now(), userId: state.user.id, namaPembeli: state.order.nama, game: state.order.game, jokiItems: state.order.jokiItems, total: state.order.total, payment: state.payment, timestamp: Date.now() };
                const pending = JSON.parse(localStorage.getItem(PENDING_KEY)) || [];
                pending.push(ticket); localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
                window.location.href = 'dashboard.html';
            });
            document.getElementById('toLogout').addEventListener('click', () => { localStorage.removeItem('shiroha_currentUser'); window.location.href = 'index.html'; });

            showStep('choice');
        })();
    </script>
</body>
</html>
