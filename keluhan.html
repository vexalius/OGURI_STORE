<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Keluhan</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168, 85, 247, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .brand h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #7c3aed); border: none; color: #fff; }

        .chat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), var(--shadow-glow);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message-row.me { align-self: flex-end; align-items: flex-end; }
        .message-row.other { align-self: flex-start; align-items: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }
        .message-row.me .message-bubble {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message-row.other .message-bubble {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #d4d4e0;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 0.7rem;
            color: #a0a0b8;
            margin-bottom: 2px;
            font-weight: 500;
            padding: 0 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 10px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        .chat-input:focus { border-color: var(--accent); }
        .send-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 600;
        }
        .send-btn:hover { background: #9333ea; }

        .empty-chat {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 0.9rem;
        }

        /* Modal Pilih User */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-lg); width: 90%; max-width: 360px; padding: 20px;
        }
        .modal h4 { color: #fff; margin-bottom: 16px; }
        .modal-list {
            max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px;
        }
        .modal-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px;
            background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .modal-item:hover { background: rgba(255,255,255,0.06); }
        .modal-item span { color: #fff; }
        .modal-item input[type="radio"] { accent-color: #a855f7; width: 18px; height: 18px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); z-index: 200;
            transition: transform 0.35s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239,68,68,0.4); background: #1e1418; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand">
                <h2>📢 Keluhan</h2>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn" id="pilihUserBtn" style="display: none;">👥 Pilih User</button>
                <a href="dashboard.html" class="btn">⬅ Kembali</a>
            </div>
        </div>

        <div class="chat-card">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ketik pesan...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <!-- Modal Pilih User (Admin) -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <h4>Pilih User</h4>
            <div class="modal-list" id="userList"></div>
            <div class="modal-actions">
                <button class="btn" id="modalCancel">Batal</button>
                <button class="btn btn-primary" id="modalPilih">Pilih</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --- User ---
            let currentUser = null;
            try { currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser')); } catch(e) {}
            if (!currentUser) { window.location.href = 'index.html'; return; }
            const isAdmin = currentUser.role === 'admin';

            // --- Data Keluhan ---
            const COMPLAINT_KEY = 'shiroha_keluhan';
            let complaints = JSON.parse(localStorage.getItem(COMPLAINT_KEY)) || [];
            function saveComplaints() { localStorage.setItem(COMPLAINT_KEY, JSON.stringify(complaints)); }

            // --- State ---
            let selectedUserId = isAdmin ? null : currentUser.id;

            // --- DOM ---
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const pilihUserBtn = document.getElementById('pilihUserBtn');
            const userModal = document.getElementById('userModal');
            const userList = document.getElementById('userList');
            const modalCancel = document.getElementById('modalCancel');
            const modalPilih = document.getElementById('modalPilih');
            const toast = document.getElementById('toast');

            // --- Toast ---
            function showToast(msg, isErr) {
                toast.textContent = msg;
                toast.className = 'toast' + (isErr ? ' error' : '');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // --- Fungsi ambil nickname dari shiroha_users ---
            function getUserName(uid) {
                const users = JSON.parse(localStorage.getItem('shiroha_users')) || [];
                const found = users.find(u => u.id === uid);
                return found ? found.username : uid;
            }

            // --- Render chat ---
            function renderChat() {
                chatMessages.innerHTML = '';
                if (!selectedUserId) {
                    chatMessages.innerHTML = '<div class="empty-chat">Silakan pilih user terlebih dahulu.</div>';
                    return;
                }

                const filtered = complaints.filter(c => c.userId === selectedUserId);
                if (filtered.length === 0) {
                    chatMessages.innerHTML = '<div class="empty-chat">Belum ada percakapan.</div>';
                    return;
                }

                filtered.forEach(msg => {
                    const isMe = msg.from === currentUser.id;
                    const rowClass = isMe ? 'me' : 'other';
                    const senderName = isMe ? 'Anda' : getUserName(msg.from);

                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message-row ${rowClass}`;
                    msgDiv.innerHTML = `
                        <div class="message-sender">${senderName}</div>
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                    `;
                    chatMessages.appendChild(msgDiv);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function escapeHtml(text) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            // --- Kirim pesan ---
            function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;
                if (!selectedUserId) {
                    showToast('Pilih user terlebih dahulu.', true);
                    return;
                }
                const msg = {
                    id: Date.now(),
                    userId: selectedUserId,
                    from: currentUser.id,
                    text: text,
                    timestamp: Date.now()
                };
                complaints.push(msg);
                saveComplaints();
                chatInput.value = '';
                renderChat();
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // --- Admin: pilih user ---
            if (isAdmin) {
                pilihUserBtn.style.display = 'inline-flex';
            }

            pilihUserBtn.addEventListener('click', () => {
                const userIds = [...new Set(complaints.map(c => c.userId))];
                userList.innerHTML = '';
                if (userIds.length === 0) {
                    userList.innerHTML = '<div style="color:#a0a0b8; text-align:center;">Belum ada keluhan.</div>';
                } else {
                    userIds.forEach(uid => {
                        const div = document.createElement('div');
                        div.className = 'modal-item';
                        div.innerHTML = `<input type="radio" name="userRadio" value="${uid}" ${selectedUserId === uid ? 'checked' : ''}> <span>${getUserName(uid)}</span>`;
                        userList.appendChild(div);
                    });
                }
                userModal.style.display = 'flex';
            });

            modalCancel.addEventListener('click', () => userModal.style.display = 'none');
            modalPilih.addEventListener('click', () => {
                const checked = document.querySelector('input[name="userRadio"]:checked');
                if (checked) {
                    selectedUserId = checked.value;
                    renderChat();
                }
                userModal.style.display = 'none';
            });
            userModal.addEventListener('click', (e) => {
                if (e.target === userModal) userModal.style.display = 'none';
            });

            // --- Init ---
            renderChat();
        })();
    </script>
</body>
</html>
