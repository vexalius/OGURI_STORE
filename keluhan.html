<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIROHA JOKI - Keluhan</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168, 85, 247, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .brand h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            color: #fff;
            box-shadow: 0 4px 15px rgba(168,85,247,0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(168,85,247,0.45);
            transform: translateY(-1px);
        }

        .chat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), var(--shadow-glow);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeInMsg 0.2s;
        }
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            align-self: flex-end;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #fff;
        }
        .message.admin {
            align-self: flex-start;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #d4d4e0;
        }
        .message .meta {
            font-size: 0.65rem;
            color: #a0a0b8;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 12px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }
        .chat-input:focus { border-color: var(--accent); }
        .send-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #9333ea; }

        .empty-chat {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 0.9rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
        }
        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 360px;
            padding: 24px;
        }
        .modal h4 { color: #fff; margin-bottom: 16px; }
        .modal-list {
            max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px;
        }
        .modal-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px;
            background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .modal-item:hover { background: rgba(255,255,255,0.06); }
        .modal-item span { color: #fff; }
        .modal-item input[type="radio"] { accent-color: #a855f7; width: 18px; height: 18px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); z-index: 200;
            transition: transform 0.35s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239,68,68,0.4); background: #1e1418; color: #fca5a5; }

        @media (max-width: 480px) {
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand">
                <h2>📢 Keluhan</h2>
            </div>
            <div class="header-actions">
                <button class="btn" id="pilihUserBtn" style="display:none;">👥 Pilih User</button>
                <a href="dashboard.html" class="btn">⬅ Kembali</a>
            </div>
        </div>

        <div class="chat-card">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ketik pesan...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <!-- Modal Pilih User (untuk admin) -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <h4>Pilih User</h4>
            <div class="modal-list" id="userList"></div>
            <div class="modal-actions">
                <button class="btn" id="modalCancel">Batal</button>
                <button class="btn btn-primary" id="modalPilih">Pilih</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Simulasi user login
            let currentUser = null;
            try {
                currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser'));
            } catch(e) {}
            if (!currentUser) {
                // Untuk demo, set sebagai user biasa
                currentUser = { id: 'user_demo', username: 'UserDemo', role: 'user' };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(currentUser));
            }

            const isAdmin = currentUser.role === 'admin';
            let selectedUserId = isAdmin ? null : currentUser.id; // admin belum pilih user, user langsung ke dirinya

            // Data chat dari localStorage
            const STORAGE_KEY = 'shiroha_keluhan';
            let chats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

            // DOM
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const pilihUserBtn = document.getElementById('pilihUserBtn');
            const modalOverlay = document.getElementById('modalOverlay');
            const userListDiv = document.getElementById('userList');
            const modalCancel = document.getElementById('modalCancel');
            const modalPilih = document.getElementById('modalPilih');
            const toast = document.getElementById('toast');

            let toastTimer;
            function showToast(msg, isError = false) {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + (isError ? 'error' : '');
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // Simpan chat ke localStorage
            function saveChats() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
            }

            // Tampilkan pesan sesuai filter
            function renderMessages() {
                chatMessages.innerHTML = '';
                let filteredChats = [];
                if (isAdmin) {
                    if (selectedUserId) {
                        filteredChats = chats.filter(c => c.userId === selectedUserId || c.dari === 'admin');
                        // Tampilkan juga pesan admin yang dikirim ke user tersebut (admin bisa reply ke user)
                        // Sebenarnya chat disimpan dengan userId = user target, jadi admin ngirim dengan userId = selectedUserId
                        filteredChats = chats.filter(c => c.userId === selectedUserId);
                    } else {
                        // belum pilih user, tampilkan semua chat (admin bisa lihat semua, tapi kita tampilkan pesan admin ke semua user campur)
                        filteredChats = chats;
                    }
                } else {
                    // User biasa hanya lihat chat miliknya
                    filteredChats = chats.filter(c => c.userId === currentUser.id);
                }

                if (filteredChats.length === 0) {
                    chatMessages.innerHTML = '<div class="empty-chat">Belum ada percakapan.</div>';
                    return;
                }

                filteredChats.forEach(chat => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message ' + (chat.dari === 'user' ? 'user' : 'admin');
                    const waktu = new Date(chat.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    msgDiv.innerHTML = `
                        <div class="meta">
                            <span>${chat.dari === 'user' ? 'Anda' : 'Admin'}</span>
                            <span>${waktu}</span>
                        </div>
                        <div>${chat.pesan}</div>
                    `;
                    chatMessages.appendChild(msgDiv);
                });
                // Scroll ke bawah
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Kirim pesan
            function sendMessage() {
                const pesan = chatInput.value.trim();
                if (!pesan) return;
                
                if (isAdmin && !selectedUserId) {
                    showToast('Silakan pilih user terlebih dahulu.', true);
                    return;
                }

                const targetUserId = isAdmin ? selectedUserId : currentUser.id;
                const newChat = {
                    id: Date.now(),
                    userId: targetUserId,
                    dari: isAdmin ? 'admin' : 'user',
                    pesan: pesan,
                    timestamp: Date.now()
                };
                chats.push(newChat);
                saveChats();
                chatInput.value = '';
                renderMessages();
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // Admin: tampilkan tombol pilih user
            if (isAdmin) {
                pilihUserBtn.style.display = 'inline-flex';
            }

            // Buka modal pilih user
            pilihUserBtn.addEventListener('click', () => {
                // Kumpulkan userId unik dari chats
                const userIds = [...new Set(chats.map(c => c.userId))];
                userListDiv.innerHTML = '';
                if (userIds.length === 0) {
                    userListDiv.innerHTML = '<div style="color:#a0a0b8; text-align:center;">Belum ada user.</div>';
                } else {
                    userIds.forEach(uid => {
                        const div = document.createElement('div');
                        div.className = 'modal-item';
                        div.innerHTML = `<input type="radio" name="userRadio" value="${uid}" ${selectedUserId === uid ? 'checked' : ''}> <span>${uid}</span>`;
                        userListDiv.appendChild(div);
                    });
                }
                modalOverlay.style.display = 'flex';
            });

            modalCancel.addEventListener('click', () => {
                modalOverlay.style.display = 'none';
            });

            modalPilih.addEventListener('click', () => {
                const selectedRadio = document.querySelector('input[name="userRadio"]:checked');
                if (selectedRadio) {
                    selectedUserId = selectedRadio.value;
                    renderMessages();
                }
                modalOverlay.style.display = 'none';
            });

            // Tutup modal saat klik overlay
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) modalOverlay.style.display = 'none';
            });

            // Inisialisasi
            renderMessages();
        })();
    </script>
</body>
</html>
