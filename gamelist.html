<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGURI STORE - Game & Layanan</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168,85,247,0.07) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .container { width: 100%; max-width: 700px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .brand h2 {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 8px 16px; border-radius: var(--radius-pill);
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition);
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #7c3aed); border: none; color: #fff; }
        .btn-primary:hover { box-shadow: 0 4px 15px rgba(168,85,247,0.4); }
        .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .btn-small { padding: 6px 12px; font-size: 0.7rem; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), var(--shadow-glow); margin-bottom: 20px;
        }
        .card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }

        .form-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .form-input, .form-select {
            flex: 1; min-width: 120px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 8px; padding: 10px;
            color: #fff; font-family: inherit; font-size: 0.85rem; outline: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--accent); }

        .fake-input {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; color: #f1f1f3; font-size: 0.85rem; min-width: 150px; flex:1;
            cursor: pointer; user-select: none;
        }
        .fake-input .placeholder { color: #55556a; }

        .list-item {
            background: rgba(255,255,255,0.03); border-radius: var(--radius-md);
            padding: 14px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px;
        }
        .list-header { display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .list-sub { margin-top: 8px; font-size: 0.85rem; }
        .rekening-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 0;
            font-size: 0.85rem; justify-content: space-between;
        }

        .empty-state { text-align: center; color: #6b6b80; padding: 20px 0; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-lg); width: 90%; max-width: 360px; padding: 20px;
        }
        .modal h4 { color: #fff; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .modal .form-group { margin-bottom: 12px; }
        .modal label { display: block; color: #a0a0b8; font-size: 0.8rem; margin-bottom: 4px; }

        .modal-list { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .modal-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px;
            background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; transition: background 0.2s;
        }
        .modal-item:hover { background: rgba(255,255,255,0.06); }
        .modal-item span { color: #fff; }
        .modal-item input[type="radio"] { accent-color: #a855f7; width: 18px; height: 18px; }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); z-index: 200;
            transition: transform 0.35s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239,68,68,0.4); background: #1e1418; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand"><h2>🎮 Game & Layanan</h2></div>
            <a href="dashboard.html" class="btn">⬅ Kembali</a>
        </div>

        <!-- Panel Admin -->
        <div id="adminPanel" style="display:none;">
            <div class="card">
                <h3>➕ Tambah Game</h3>
                <div class="form-row">
                    <input type="text" class="form-input" id="gameName" placeholder="Nama Game">
                    <button class="btn btn-primary" id="addGameBtn">Tambah</button>
                </div>
            </div>
            <div class="card">
                <h3>➕ Tambah Layanan Joki</h3>
                <div class="form-row">
                    <div class="fake-input" id="selectGameForJokiBtn">
                        <span id="selectedGameForJokiText" class="placeholder">Pilih Game...</span>
                        <span>🔽</span>
                    </div>
                    <input type="text" class="form-input" id="jokiName" placeholder="Nama Layanan">
                    <input type="number" class="form-input" id="jokiPrice" placeholder="Harga" min="0">
                    <button class="btn btn-primary" id="addJokiBtn">Tambah</button>
                </div>
            </div>
            <div class="card">
                <h3>🏦 Kelola Rekening Admin</h3>
                <div id="rekeningList"></div>
                <button class="btn btn-primary btn-small" id="addRekeningBtn">+ Tambah Rekening</button>
            </div>
        </div>

        <!-- Daftar Game & Layanan -->
        <div class="card">
            <h3>📋 Daftar Game & Layanan</h3>
            <div id="gameListContainer"></div>
        </div>
    </div>

    <!-- Modal Edit Game -->
    <div class="modal-overlay" id="editGameModal">
        <div class="modal">
            <h4>✏️ Edit Game</h4>
            <input type="hidden" id="editGameId">
            <div class="form-group">
                <label>Nama Game</label>
                <input type="text" class="form-input" id="editGameName">
            </div>
            <div class="modal-actions">
                <button class="btn" id="closeEditGameModal">Batal</button>
                <button class="btn btn-primary" id="saveEditGame">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Edit Joki -->
    <div class="modal-overlay" id="editJokiModal">
        <div class="modal">
            <h4>✏️ Edit Layanan</h4>
            <input type="hidden" id="editJokiId">
            <div class="form-group">
                <label>Nama Layanan</label>
                <input type="text" class="form-input" id="editJokiName">
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" class="form-input" id="editJokiPrice" min="0">
            </div>
            <div class="modal-actions">
                <button class="btn" id="closeEditJokiModal">Batal</button>
                <button class="btn btn-primary" id="saveEditJoki">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Rekening -->
    <div class="modal-overlay" id="rekeningModal">
        <div class="modal">
            <h4 id="rekeningModalTitle">Tambah Rekening</h4>
            <input type="hidden" id="rekeningId">
            <div class="form-group"><label>Jenis</label><select class="form-select" id="rekeningJenis"><option value="bank">🏦 Bank</option><option value="ewallet">💰 E-Wallet</option></select></div>
            <div class="form-group"><label>Nama Bank/E-Wallet</label><input type="text" class="form-input" id="rekeningNama" placeholder="BCA, DANA, dll"></div>
            <div class="form-group"><label>Nomor Rekening</label><input type="text" class="form-input" id="rekeningNomor" placeholder="1234567890"></div>
            <div class="form-group"><label>Atas Nama</label><input type="text" class="form-input" id="rekeningAtasNama" placeholder="Admin OGURI"></div>
            <div class="modal-actions">
                <button class="btn" id="closeRekeningModal">Batal</button>
                <button class="btn btn-primary" id="saveRekening">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Pilih Game -->
    <div class="modal-overlay" id="selectGameModal">
        <div class="modal">
            <h4>Pilih Game</h4>
            <div class="modal-list" id="selectGameList"></div>
            <div class="modal-actions">
                <button class="btn" id="closeSelectGameModal">Batal</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --- User ---
            let currentUser = null;
            try { currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser')); } catch(e) {}
            if (!currentUser) { window.location.href = 'index.html'; return; }
            const isAdmin = currentUser.role === 'admin';

            const GAMES_KEY = 'shiroha_game_list';
            const JOKI_KEY = 'shiroha_joki_services';
            const REKENING_KEY = 'shiroha_rekening_admin';

            let games = JSON.parse(localStorage.getItem(GAMES_KEY)) || [];
            let jokiServices = JSON.parse(localStorage.getItem(JOKI_KEY)) || [];
            let rekeningAdmin = JSON.parse(localStorage.getItem(REKENING_KEY)) || [];

            if (games.length === 0) {
                games = [{ id: 1, nama: 'Genshin Impact' },{ id: 2, nama: 'Honkai Star Rail' },{ id: 3, nama: 'Mobile Legends' },{ id: 4, nama: 'PUBG Mobile' },{ id: 5, nama: 'Valorant' }];
                localStorage.setItem(GAMES_KEY, JSON.stringify(games));
            }
            if (jokiServices.length === 0) {
                jokiServices = [{ id: 1, gameId: 1, nama: 'Explore x1', harga: 15000 },{ id: 2, gameId: 1, nama: 'Explore x2', harga: 25000 },{ id: 3, gameId: 2, nama: 'Push Rank', harga: 50000 },{ id: 4, gameId: 3, nama: 'Selesaikan Event', harga: 35000 }];
                localStorage.setItem(JOKI_KEY, JSON.stringify(jokiServices));
            }
            if (rekeningAdmin.length === 0) {
                rekeningAdmin = [{ id: 1, jenis: 'bank', nama: 'BCA', nomor: '1234567890', atasNama: 'Admin OGURI' },{ id: 2, jenis: 'ewallet', nama: 'DANA', nomor: '08123456789', atasNama: 'Admin OGURI' }];
                localStorage.setItem(REKENING_KEY, JSON.stringify(rekeningAdmin));
            }

            function saveGames() { localStorage.setItem(GAMES_KEY, JSON.stringify(games)); }
            function saveJoki() { localStorage.setItem(JOKI_KEY, JSON.stringify(jokiServices)); }
            function saveRekening() { localStorage.setItem(REKENING_KEY, JSON.stringify(rekeningAdmin)); }

            const toast = document.getElementById('toast');
            function showToast(msg, isErr = false) { toast.textContent = msg; toast.className = 'toast' + (isErr ? ' error' : ''); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }

            if (isAdmin) document.getElementById('adminPanel').style.display = 'block';

            let selectedGameForJokiId = null;

            function renderGameList() {
                const container = document.getElementById('gameListContainer');
                if (games.length === 0) { container.innerHTML = '<div class="empty-state">Belum ada game tersedia.</div>'; return; }
                container.innerHTML = games.map(game => {
                    const layanan = jokiServices.filter(j => j.gameId === game.id);
                    return `<div class="list-item">
                        <div class="list-header"><span>${game.nama}</span> ${isAdmin ? `<div><button class="btn btn-small edit-game-btn" data-id="${game.id}">✏️</button><button class="btn btn-small btn-danger delete-game-btn" data-id="${game.id}">🗑</button></div>` : ''}</div>
                        <div class="list-sub">${layanan.length ? layanan.map(j => `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;"><span>• ${j.nama} — Rp ${j.harga.toLocaleString('id-ID')}</span> ${isAdmin ? `<div><button class="btn btn-small edit-joki-btn" data-id="${j.id}">✏️</button><button class="btn btn-small btn-danger delete-joki-btn" data-id="${j.id}">🗑</button></div>` : ''}</div>`).join('') : '<span style="color:#6b6b80;">Belum ada layanan</span>'}</div>
                    </div>`;
                }).join('');
                if (isAdmin) {
                    document.querySelectorAll('.edit-game-btn').forEach(b => b.addEventListener('click', () => openEditGameModal(parseInt(b.dataset.id))));
                    document.querySelectorAll('.delete-game-btn').forEach(b => b.addEventListener('click', () => deleteGame(parseInt(b.dataset.id))));
                    document.querySelectorAll('.edit-joki-btn').forEach(b => b.addEventListener('click', () => openEditJokiModal(parseInt(b.dataset.id))));
                    document.querySelectorAll('.delete-joki-btn').forEach(b => b.addEventListener('click', () => deleteJoki(parseInt(b.dataset.id))));
                }
            }

            function renderRekening() {
                const container = document.getElementById('rekeningList');
                if (!container) return;
                if (rekeningAdmin.length === 0) { container.innerHTML = '<div class="empty-state">Belum ada rekening terdaftar.</div>'; return; }
                container.innerHTML = rekeningAdmin.map(r => `<div class="rekening-item"><span>${r.jenis === 'bank' ? '🏦' : '💰'} ${r.nama} - ${r.nomor} a/n ${r.atasNama}</span><div><button class="btn btn-small edit-rekening-btn" data-id="${r.id}">✏️</button><button class="btn btn-small btn-danger delete-rekening-btn" data-id="${r.id}">🗑</button></div></div>`).join('');
                document.querySelectorAll('.edit-rekening-btn').forEach(b => b.addEventListener('click', () => openRekeningModal(parseInt(b.dataset.id))));
                document.querySelectorAll('.delete-rekening-btn').forEach(b => b.addEventListener('click', () => deleteRekening(parseInt(b.dataset.id))));
            }

            function renderAll() { renderGameList(); if (isAdmin) renderRekening(); }

            // --- Game CRUD ---
            const editGameModal = document.getElementById('editGameModal');
            document.getElementById('closeEditGameModal').addEventListener('click', () => editGameModal.style.display = 'none');
            document.getElementById('saveEditGame').addEventListener('click', () => {
                const id = parseInt(document.getElementById('editGameId').value);
                const game = games.find(g => g.id === id);
                if (game) { game.nama = document.getElementById('editGameName').value.trim(); saveGames(); renderAll(); editGameModal.style.display = 'none'; showToast('Game diperbarui.'); }
            });
            function openEditGameModal(id) {
                const game = games.find(g => g.id === id); if (!game) return;
                document.getElementById('editGameId').value = game.id; document.getElementById('editGameName').value = game.nama;
                editGameModal.style.display = 'flex';
            }
            function deleteGame(id) { if (!confirm('Hapus game ini?')) return; games = games.filter(g => g.id !== id); jokiServices = jokiServices.filter(j => j.gameId !== id); saveGames(); saveJoki(); renderAll(); showToast('Game dihapus.'); }
            document.getElementById('addGameBtn').addEventListener('click', () => {
                const nama = document.getElementById('gameName').value.trim(); if (!nama) { showToast('Nama game harus diisi.', true); return; }
                games.push({ id: Date.now(), nama }); saveGames(); document.getElementById('gameName').value = ''; renderAll(); showToast('Game ditambahkan.');
            });

            // --- Joki CRUD ---
            const editJokiModal = document.getElementById('editJokiModal');
            document.getElementById('closeEditJokiModal').addEventListener('click', () => editJokiModal.style.display = 'none');
            document.getElementById('saveEditJoki').addEventListener('click', () => {
                const id = parseInt(document.getElementById('editJokiId').value);
                const joki = jokiServices.find(j => j.id === id);
                if (joki) { const nama = document.getElementById('editJokiName').value.trim(); const harga = parseInt(document.getElementById('editJokiPrice').value); if (!nama || isNaN(harga) || harga < 0) { showToast('Data tidak valid.', true); return; } joki.nama = nama; joki.harga = harga; saveJoki(); renderAll(); editJokiModal.style.display = 'none'; showToast('Layanan diperbarui.'); }
            });
            function openEditJokiModal(id) {
                const joki = jokiServices.find(j => j.id === id); if (!joki) return;
                document.getElementById('editJokiId').value = joki.id; document.getElementById('editJokiName').value = joki.nama; document.getElementById('editJokiPrice').value = joki.harga;
                editJokiModal.style.display = 'flex';
            }
            function deleteJoki(id) { if (!confirm('Hapus layanan ini?')) return; jokiServices = jokiServices.filter(j => j.id !== id); saveJoki(); renderAll(); showToast('Layanan dihapus.'); }
            document.getElementById('addJokiBtn').addEventListener('click', () => {
                if (!selectedGameForJokiId) { showToast('Pilih game terlebih dahulu.', true); return; }
                const nama = document.getElementById('jokiName').value.trim(); const harga = parseInt(document.getElementById('jokiPrice').value);
                if (!nama || isNaN(harga) || harga < 0) { showToast('Lengkapi data dengan benar.', true); return; }
                jokiServices.push({ id: Date.now(), gameId: selectedGameForJokiId, nama, harga }); saveJoki();
                document.getElementById('jokiName').value = ''; document.getElementById('jokiPrice').value = ''; renderAll(); showToast('Layanan ditambahkan.');
            });

            // --- Popup Pilih Game ---
            document.getElementById('selectGameForJokiBtn').addEventListener('click', () => {
                const modal = document.getElementById('selectGameModal');
                const listEl = document.getElementById('selectGameList');
                listEl.innerHTML = games.map(g => `<div class="modal-item" data-gameid="${g.id}"><input type="radio" name="gameSelectRadio" value="${g.id}" ${selectedGameForJokiId === g.id ? 'checked' : ''}> <span>${g.nama}</span></div>`).join('');
                modal.style.display = 'flex';
                listEl.querySelectorAll('.modal-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const radio = item.querySelector('input'); radio.checked = true;
                        selectedGameForJokiId = parseInt(item.dataset.gameid);
                        document.getElementById('selectedGameForJokiText').textContent = games.find(g => g.id === selectedGameForJokiId).nama;
                        document.getElementById('selectedGameForJokiText').classList.remove('placeholder');
                        modal.style.display = 'none';
                    });
                });
            });
            document.getElementById('closeSelectGameModal').addEventListener('click', () => document.getElementById('selectGameModal').style.display = 'none');

            // --- Rekening CRUD ---
            const rekeningModal = document.getElementById('rekeningModal');
            document.getElementById('closeRekeningModal').addEventListener('click', () => rekeningModal.style.display = 'none');
            document.getElementById('saveRekening').addEventListener('click', () => {
                const id = document.getElementById('rekeningId').value ? parseInt(document.getElementById('rekeningId').value) : Date.now();
                const data = { id, jenis: document.getElementById('rekeningJenis').value, nama: document.getElementById('rekeningNama').value.trim(), nomor: document.getElementById('rekeningNomor').value.trim(), atasNama: document.getElementById('rekeningAtasNama').value.trim() };
                if (!data.nama || !data.nomor || !data.atasNama) { showToast('Lengkapi data rekening.', true); return; }
                const existing = rekeningAdmin.find(r => r.id === id);
                if (existing) Object.assign(existing, data); else rekeningAdmin.push(data);
                saveRekening(); rekeningModal.style.display = 'none'; renderRekening(); showToast('Rekening disimpan.');
            });
            function openRekeningModal(id = null) {
                if (id) { const rek = rekeningAdmin.find(r => r.id === id); if (!rek) return; document.getElementById('rekeningId').value = rek.id; document.getElementById('rekeningJenis').value = rek.jenis; document.getElementById('rekeningNama').value = rek.nama; document.getElementById('rekeningNomor').value = rek.nomor; document.getElementById('rekeningAtasNama').value = rek.atasNama; document.getElementById('rekeningModalTitle').textContent = 'Edit Rekening'; }
                else { document.getElementById('rekeningId').value = ''; document.getElementById('rekeningJenis').value = 'bank'; document.getElementById('rekeningNama').value = ''; document.getElementById('rekeningNomor').value = ''; document.getElementById('rekeningAtasNama').value = 'Admin OGURI'; document.getElementById('rekeningModalTitle').textContent = 'Tambah Rekening'; }
                rekeningModal.style.display = 'flex';
            }
            function deleteRekening(id) { if (!confirm('Hapus rekening ini?')) return; rekeningAdmin = rekeningAdmin.filter(r => r.id !== id); saveRekening(); renderRekening(); showToast('Rekening dihapus.'); }
            document.getElementById('addRekeningBtn').addEventListener('click', () => openRekeningModal());

            renderAll();
        })();
    </script>
</body>
</html>
