<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIROHA JOKI - Game/List</title>
    <style>
        :root {
            --bg: #06060e;
            --card-bg: rgba(18, 18, 30, 0.75);
            --accent: #a855f7;
            --text: #f1f1f3;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.06);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 50px;
            --shadow-glow: 0 0 50px rgba(168, 85, 247, 0.1);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(168, 85, 247, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .brand h2 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #7c3aed); border: none; color: #fff; }
        .btn-primary:hover { box-shadow: 0 4px 15px rgba(168,85,247,0.4); }
        .btn-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .btn-small { padding: 6px 12px; font-size: 0.7rem; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), var(--shadow-glow);
            margin-bottom: 20px;
        }
        .card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #fff;
        }
        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .form-input {
            flex: 1;
            min-width: 120px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-select {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            min-width: 130px;
        }
        .form-select option { background: #1a1a2e; }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .game-item {
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-md);
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .game-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }
        .game-base-price {
            font-size: 0.8rem;
            color: #a0a0b8;
        }
        .joki-list {
            margin-left: 16px;
            font-size: 0.8rem;
            color: #d4d4e0;
        }
        .joki-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }
        .joki-row span { flex: 1; }
        .edit-btn, .del-btn {
            background: none;
            border: none;
            color: #6b6b80;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .edit-btn:hover { color: #d8b4fe; }
        .del-btn:hover { color: #fca5a5; }

        .empty-state {
            text-align: center;
            color: #6b6b80;
            padding: 20px 0;
        }

        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1e1e2e; color: #f1f1f3; padding: 12px 22px; border-radius: var(--radius-pill);
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); z-index: 200;
            transition: transform 0.35s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(239,68,68,0.4); background: #1e1418; color: #fca5a5; }

        @media (max-width: 500px) {
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="header">
            <div class="brand">
                <h2>🎮 Game & List Joki</h2>
            </div>
            <a href="dashboard.html" class="btn">⬅ Kembali</a>
        </div>

        <!-- Card Admin (tambah game/layanan) -->
        <div class="card" id="adminCard" style="display: none;">
            <h3>➕ Tambah Data</h3>
            <div class="form-row">
                <input type="text" class="form-input" id="inputNamaGame" placeholder="Nama Game">
                <input type="number" class="form-input" id="inputHargaGame" placeholder="Harga Game" min="0">
                <button class="btn btn-primary" id="btnTambahGame">Tambah Game</button>
            </div>
            <div class="form-row">
                <select class="form-select" id="selectGameForJoki">
                    <option value="">Pilih Game</option>
                </select>
                <input type="text" class="form-input" id="inputNamaJoki" placeholder="Nama Layanan">
                <input type="number" class="form-input" id="inputHargaJoki" placeholder="Harga Layanan" min="0">
                <button class="btn btn-primary" id="btnTambahJoki">Tambah Layanan</button>
            </div>
        </div>

        <!-- Daftar Game -->
        <div class="card">
            <h3>📋 Daftar Game & Layanan</h3>
            <div class="game-list" id="gameListContainer"></div>
        </div>
    </div>

    <script>
        (function() {
            // Current user
            let currentUser = null;
            try {
                currentUser = JSON.parse(localStorage.getItem('shiroha_currentUser'));
            } catch(e) {}
            if (!currentUser) {
                currentUser = { id: 'user_demo', username: 'DemoUser', role: 'user' };
                localStorage.setItem('shiroha_currentUser', JSON.stringify(currentUser));
            }
            const isAdmin = currentUser.role === 'admin';

            // Data game dan joki dari localStorage
            const GAMES_KEY = 'shiroha_game_list';
            const JOKI_KEY = 'shiroha_joki_services';

            let games = JSON.parse(localStorage.getItem(GAMES_KEY)) || [];
            let jokiServices = JSON.parse(localStorage.getItem(JOKI_KEY)) || [];

            // Default data jika kosong
            if (games.length === 0) {
                games = [
                    { id: 1, nama: 'Genshin Impact', harga: 25000 },
                    { id: 2, nama: 'Honkai Star Rail', harga: 25000 },
                    { id: 3, nama: 'Mobile Legends', harga: 20000 }
                ];
                localStorage.setItem(GAMES_KEY, JSON.stringify(games));
            }
            if (jokiServices.length === 0) {
                jokiServices = [
                    { id: 1, gameId: 1, nama: 'Explore x1', harga: 15000 },
                    { id: 2, gameId: 1, nama: 'Explore x2', harga: 25000 },
                    { id: 3, gameId: 2, nama: 'Push Rank', harga: 50000 },
                    { id: 4, gameId: 3, nama: 'Selesaikan Event', harga: 35000 }
                ];
                localStorage.setItem(JOKI_KEY, JSON.stringify(jokiServices));
            }

            function saveGames() { localStorage.setItem(GAMES_KEY, JSON.stringify(games)); }
            function saveJoki() { localStorage.setItem(JOKI_KEY, JSON.stringify(jokiServices)); }

            // DOM
            const adminCard = document.getElementById('adminCard');
            const gameListContainer = document.getElementById('gameListContainer');
            const inputNamaGame = document.getElementById('inputNamaGame');
            const inputHargaGame = document.getElementById('inputHargaGame');
            const btnTambahGame = document.getElementById('btnTambahGame');
            const selectGameForJoki = document.getElementById('selectGameForJoki');
            const inputNamaJoki = document.getElementById('inputNamaJoki');
            const inputHargaJoki = document.getElementById('inputHargaJoki');
            const btnTambahJoki = document.getElementById('btnTambahJoki');
            const toast = document.getElementById('toast');

            let toastTimer;
            function showToast(msg, isError = false) {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + (isError ? 'error' : '');
                void toast.offsetWidth;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // Tampilkan admin card jika admin
            if (isAdmin) {
                adminCard.style.display = 'block';
            }

            // Populate select game
            function populateSelectGame() {
                selectGameForJoki.innerHTML = '<option value="">Pilih Game</option>';
                games.forEach(g => {
                    selectGameForJoki.innerHTML += `<option value="${g.id}">${g.nama}</option>`;
                });
            }

            // Render daftar game
            function renderGameList() {
                gameListContainer.innerHTML = '';
                if (games.length === 0) {
                    gameListContainer.innerHTML = '<div class="empty-state">Belum ada game tersedia.</div>';
                    return;
                }
                games.forEach(game => {
                    const gameDiv = document.createElement('div');
                    gameDiv.className = 'game-item';
                    const gameJoki = jokiServices.filter(j => j.gameId === game.id);
                    let jokiHtml = '';
                    if (gameJoki.length === 0) {
                        jokiHtml = '<div style="color:#6b6b80; margin-left:16px;">Belum ada layanan</div>';
                    } else {
                        gameJoki.forEach(j => {
                            jokiHtml += `
                                <div class="joki-row">
                                    <span>• ${j.nama} — Rp ${j.harga.toLocaleString('id-ID')}</span>
                                    ${isAdmin ? `<div>
                                        <button class="edit-btn" data-joki-id="${j.id}">✏️</button>
                                        <button class="del-btn" data-joki-id="${j.id}">🗑</button>
                                    </div>` : ''}
                                </div>`;
                        });
                    }
                    gameDiv.innerHTML = `
                        <div class="game-item-header">
                            <div>
                                <span class="game-name">${game.nama}</span>
                                <span class="game-base-price"> | Harga Game: Rp ${game.harga.toLocaleString('id-ID')}</span>
                            </div>
                            ${isAdmin ? `<div>
                                <button class="edit-btn" data-game-id="${game.id}">✏️ Edit</button>
                                <button class="del-btn" data-game-id="${game.id}">🗑 Hapus</button>
                            </div>` : ''}
                        </div>
                        <div class="joki-list">${jokiHtml}</div>
                    `;
                    gameListContainer.appendChild(gameDiv);
                });

                // Attach event listeners untuk tombol edit/hapus game
                if (isAdmin) {
                    document.querySelectorAll('[data-game-id]').forEach(btn => {
                        const gameId = parseInt(btn.dataset.gameId);
                        if (btn.classList.contains('edit-btn')) {
                            btn.addEventListener('click', () => editGame(gameId));
                        } else if (btn.classList.contains('del-btn')) {
                            btn.addEventListener('click', () => deleteGame(gameId));
                        }
                    });
                    document.querySelectorAll('[data-joki-id]').forEach(btn => {
                        const jokiId = parseInt(btn.dataset.jokiId);
                        if (btn.classList.contains('edit-btn')) {
                            btn.addEventListener('click', () => editJoki(jokiId));
                        } else if (btn.classList.contains('del-btn')) {
                            btn.addEventListener('click', () => deleteJoki(jokiId));
                        }
                    });
                }
            }

            // Tambah game
            btnTambahGame.addEventListener('click', () => {
                const nama = inputNamaGame.value.trim();
                const harga = parseInt(inputHargaGame.value);
                if (!nama || isNaN(harga) || harga < 0) {
                    showToast('Mohon isi nama dan harga game dengan benar.', true);
                    return;
                }
                const newGame = {
                    id: Date.now(),
                    nama,
                    harga
                };
                games.push(newGame);
                saveGames();
                inputNamaGame.value = '';
                inputHargaGame.value = '';
                populateSelectGame();
                renderGameList();
                showToast('Game berhasil ditambahkan.');
            });

            // Tambah joki
            btnTambahJoki.addEventListener('click', () => {
                const gameId = parseInt(selectGameForJoki.value);
                const nama = inputNamaJoki.value.trim();
                const harga = parseInt(inputHargaJoki.value);
                if (!gameId || !nama || isNaN(harga) || harga < 0) {
                    showToast('Lengkapi semua data layanan.', true);
                    return;
                }
                const newJoki = {
                    id: Date.now(),
                    gameId,
                    nama,
                    harga
                };
                jokiServices.push(newJoki);
                saveJoki();
                inputNamaJoki.value = '';
                inputHargaJoki.value = '';
                renderGameList();
                showToast('Layanan berhasil ditambahkan.');
            });

            // Edit game (sederhana: prompt)
            function editGame(gameId) {
                const game = games.find(g => g.id === gameId);
                if (!game) return;
                const newNama = prompt('Edit Nama Game:', game.nama);
                if (newNama === null) return;
                const newHarga = prompt('Edit Harga Game (Rp):', game.harga);
                if (newHarga === null) return;
                const hargaNum = parseInt(newHarga);
                if (!newNama.trim() || isNaN(hargaNum) || hargaNum < 0) {
                    showToast('Data tidak valid.', true);
                    return;
                }
                game.nama = newNama.trim();
                game.harga = hargaNum;
                saveGames();
                populateSelectGame();
                renderGameList();
                showToast('Game diperbarui.');
            }

            // Hapus game
            function deleteGame(gameId) {
                if (!confirm('Hapus game ini beserta semua layanannya?')) return;
                games = games.filter(g => g.id !== gameId);
                jokiServices = jokiServices.filter(j => j.gameId !== gameId);
                saveGames();
                saveJoki();
                populateSelectGame();
                renderGameList();
                showToast('Game dihapus.');
            }

            // Edit joki
            function editJoki(jokiId) {
                const joki = jokiServices.find(j => j.id === jokiId);
                if (!joki) return;
                const newNama = prompt('Edit Nama Layanan:', joki.nama);
                if (newNama === null) return;
                const newHarga = prompt('Edit Harga (Rp):', joki.harga);
                if (newHarga === null) return;
                const hargaNum = parseInt(newHarga);
                if (!newNama.trim() || isNaN(hargaNum) || hargaNum < 0) {
                    showToast('Data tidak valid.', true);
                    return;
                }
                joki.nama = newNama.trim();
                joki.harga = hargaNum;
                saveJoki();
                renderGameList();
                showToast('Layanan diperbarui.');
            }

            // Hapus joki
            function deleteJoki(jokiId) {
                if (!confirm('Hapus layanan ini?')) return;
                jokiServices = jokiServices.filter(j => j.id !== jokiId);
                saveJoki();
                renderGameList();
                showToast('Layanan dihapus.');
            }

            // Inisialisasi
            populateSelectGame();
            renderGameList();
        })();
    </script>
</body>
</html>
